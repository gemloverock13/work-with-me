!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workplace Self-Assessment — Brain in Hand</title>
<meta name="description" content="A private tool to help you understand where you need support at work — and put it into words.">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --plum:   #1B002E;
  --purple: #8E3CCE;
  --lilac:  #EAC1FF;
  --pale:   #F5EAF9;
  --amber:  #FFC962;
  --yellow: #FFE95C;
  --bg:     #FAF9F5;
  --muted:  #6B5A7E;
  --green:  #2E7D52;
  --green-bg:#E8F5EE;
  --green-bd:#A8D5BC;
  --amber-bg:#FFF8E1;
  --amber-bd:#FFE082;
  --red:    #C0392B;
  --red-bg: #FFF5F5;
  --red-bd: #FFCDD2;
  --priv:   #4A6FA5;
  --priv-bg:#EEF3FB;
  --priv-bd:#B8CFEE;
  --drain:  #E05555;
}
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--plum);
  -webkit-font-smoothing: antialiased;
}
button, input, textarea { font-family: inherit; }
 
.shell { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
 
/* Header */
.hdr { background: var(--plum); padding: 1.1rem 1.25rem 0.7rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { color: var(--yellow); font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
.logo span { color: rgba(255,255,255,.4); font-weight: 400; letter-spacing: 0; text-transform: none; margin-left: 5px; }
.sc { font-size: 11px; color: rgba(255,255,255,.35); }
.pips { background: var(--plum); padding: 0 1.25rem .9rem; display: flex; gap: 4px; }
.pip { height: 3px; border-radius: 2px; flex: 1; background: rgba(255,255,255,.15); transition: background .3s; }
.pip.done { background: var(--yellow); }
.pip.active { background: var(--lilac); }
 
/* Typography */
.s-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--purple); padding: 1.25rem 1.25rem .3rem; }
.s-head { font-size: 20px; font-weight: 500; color: var(--plum); padding: 0 1.25rem .3rem; line-height: 1.3; }
.s-warm { font-size: 13px; color: var(--purple); padding: 0 1.25rem .25rem; line-height: 1.5; font-style: italic; }
.s-sub  { font-size: 12px; color: var(--muted); padding: 0 1.25rem .9rem; line-height: 1.6; }
 
/* Cards */
.info-card { margin: 0 1.25rem 1rem; background: #fff; border-radius: 12px; border: .5px solid var(--lilac); padding: 1rem 1.1rem; }
.info-card p { font-size: 12px; color: var(--muted); line-height: 1.65; margin-bottom: .6rem; }
.info-card p:last-child { margin-bottom: 0; }
.info-card strong { color: var(--plum); font-weight: 500; }
.info-small { font-size: 11px; color: #9B8AAA; padding: 0 1.25rem; line-height: 1.5; }
 
.note-box { margin: 0 1.25rem .75rem; border-radius: 8px; padding: 9px 11px; font-size: 11px; line-height: 1.55; }
.note-warm  { background: #FFF8EC; border: .5px solid var(--amber); color: #6B4200; }
.note-priv  { background: var(--priv-bg); border: .5px solid var(--priv-bd); color: var(--priv); }
.note-green { background: var(--green-bg); border: .5px solid var(--green-bd); color: var(--green); }
 
/* JD upload */
.jd-box { margin: 0 1.25rem .75rem; border: 1.5px dashed var(--lilac); border-radius: 10px; padding: .85rem; background: #fff; cursor: pointer; display: flex; align-items: center; gap: 9px; transition: border-color .15s; }
.jd-box:hover { border-color: var(--purple); }
.jd-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--pale); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.jd-title { font-size: 12px; font-weight: 500; color: var(--plum); }
.jd-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
.jd-badge { font-size: 10px; background: var(--amber); color: var(--plum); padding: 2px 7px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
 
/* Spectrum slider — how are things */
.spectrum-wrap { margin: 0 1.25rem 1rem; }
.spectrum-track {
  position: relative; height: 48px;
  background: linear-gradient(to right, var(--green-bg), var(--amber-bg), var(--red-bg));
  border-radius: 24px;
  border: .5px solid var(--lilac);
  overflow: hidden;
  margin-bottom: .5rem;
}
.spectrum-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  border-radius: 24px;
  transition: width .2s;
  opacity: .3;
}
input[type=range].spectrum {
  position: absolute; inset: 0; width: 100%; height: 100%;
  appearance: none; background: transparent; cursor: pointer;
  padding: 0 16px;
}
input[type=range].spectrum::-webkit-slider-thumb {
  appearance: none; width: 32px; height: 32px;
  border-radius: 50%; background: var(--plum);
  border: 3px solid #fff;
  box-shadow: 0 2px 8px rgba(27,0,46,.25);
  cursor: pointer;
}
input[type=range].spectrum::-moz-range-thumb {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--plum); border: 3px solid #fff; cursor: pointer;
}
.spectrum-label { font-size: 13px; font-weight: 500; color: var(--plum); text-align: center; margin-bottom: 4px; }
.spectrum-desc  { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.5; font-style: italic; }
.spectrum-ends  { display: flex; justify-content: space-between; margin-top: 4px; }
.spectrum-ends span { font-size: 10px; color: var(--muted); }
 
/* Recognition tiles — the "do any of these sound familiar" screen */
.recog-grid { display: flex; flex-direction: column; gap: 6px; padding: 0 1.25rem .5rem; }
.recog-tile {
  background: #fff;
  border: 1.5px solid #EDE0F5;
  border-radius: 10px;
  padding: 11px 12px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 10px;
  -webkit-tap-highlight-color: transparent;
}
.recog-tile:hover { border-color: var(--lilac); background: var(--pale); }
.recog-tile.yes  { border-color: var(--purple); background: var(--pale); }
.recog-tile.sometimes { border-color: var(--amber); background: var(--amber-bg); }
.recog-dot {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid #DDD3E8; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.recog-tile.yes .recog-dot { background: var(--purple); border-color: var(--purple); }
.recog-tile.sometimes .recog-dot { background: var(--amber); border-color: var(--amber); }
.recog-dot-inner { width: 8px; height: 8px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity .15s; }
.recog-tile.yes .recog-dot-inner { opacity: 1; }
.recog-tile.sometimes .recog-dot-inner { opacity: 1; }
.recog-text { font-size: 12px; color: var(--plum); line-height: 1.45; flex: 1; }
.recog-state { font-size: 9px; font-weight: 500; flex-shrink: 0; }
.recog-tile.yes .recog-state { color: var(--purple); }
.recog-tile.sometimes .recog-state { color: #7B5800; }
 
.recog-legend { display: flex; gap: 8px; padding: 0 1.25rem .75rem; flex-wrap: wrap; }
.recog-leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); cursor: pointer; }
.recog-leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
 
/* Drill screens */
.drill-card {
  margin: 0 1.25rem .75rem;
  background: #fff;
  border-radius: 12px;
  border: .5px solid var(--lilac);
  overflow: hidden;
}
.drill-context {
  background: var(--pale);
  padding: .75rem 1rem;
  font-size: 12px;
  color: var(--muted);
  border-bottom: .5px solid var(--lilac);
  line-height: 1.5;
}
.drill-context strong { color: var(--purple); font-weight: 500; }
.drill-q {
  font-size: 14px;
  font-weight: 500;
  color: var(--plum);
  padding: .9rem 1rem .7rem;
  line-height: 1.4;
}
.drill-options { display: flex; flex-direction: column; }
.drill-opt {
  display: flex; align-items: center; gap: 10px;
  padding: .65rem 1rem;
  cursor: pointer;
  border-top: .5px solid var(--pale);
  transition: background .12s;
  -webkit-tap-highlight-color: transparent;
}
.drill-opt:hover { background: var(--pale); }
.drill-opt.selected { background: var(--pale); }
.drill-opt-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid var(--lilac); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.drill-opt.selected .drill-opt-dot { background: var(--purple); border-color: var(--purple); }
.drill-opt-inner { width: 7px; height: 7px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity .15s; }
.drill-opt.selected .drill-opt-inner { opacity: 1; }
.drill-opt-text { font-size: 12px; color: var(--plum); line-height: 1.4; flex: 1; }
 
/* Progress through drill items */
.drill-progress {
  display: flex; align-items: center; gap: 8px;
  padding: 0 1.25rem .5rem;
}
.drill-progress-text { font-size: 11px; color: var(--muted); }
.drill-pips { display: flex; gap: 4px; }
.drill-pip { width: 6px; height: 6px; border-radius: 50%; background: #DDD3E8; }
.drill-pip.done { background: var(--purple); }
.drill-pip.active { background: var(--lilac); border: 1.5px solid var(--purple); }
 
/* What's been tried */
.tried-section { margin: 0 1.25rem .75rem; }
.tried-item {
  background: #fff;
  border: .5px solid var(--lilac);
  border-radius: 10px;
  padding: .85rem 1rem;
  margin-bottom: 6px;
}
.tried-item-text { font-size: 12px; color: var(--plum); margin-bottom: .6rem; line-height: 1.4; }
.tried-ratings { display: flex; gap: 6px; flex-wrap: wrap; }
.tried-rating {
  font-size: 11px; padding: 4px 10px; border-radius: 20px;
  cursor: pointer; border: 1.5px solid transparent;
  transition: all .15s; background: var(--pale); color: var(--muted);
}
.tried-rating:hover { border-color: var(--lilac); }
.tried-rating.helped    { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
.tried-rating.helped-bit { background: var(--amber-bg); border-color: var(--amber-bd); color: #7B5800; }
.tried-rating.didnt     { background: var(--red-bg); border-color: var(--red-bd); color: var(--red); }
.tried-rating.not-tried { background: var(--pale); border-color: var(--lilac); color: var(--muted); }
 
/* Suggestions */
.suggestion-grid { display: flex; flex-direction: column; gap: 6px; padding: 0 1.25rem .5rem; }
.suggestion-item {
  background: #fff;
  border: 1.5px solid #EDE0F5;
  border-radius: 10px;
  padding: 10px 12px;
  display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.suggestion-item:hover { border-color: var(--lilac); }
.suggestion-item.selected { border-color: var(--purple); background: var(--pale); }
.suggestion-dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #DDD3E8; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.suggestion-item.selected .suggestion-dot { background: var(--purple); border-color: var(--purple); }
.suggestion-dot-inner { width: 8px; height: 8px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity .15s; }
.suggestion-item.selected .suggestion-dot-inner { opacity: 1; }
.suggestion-text { font-size: 12px; color: var(--plum); line-height: 1.4; flex: 1; }
.suggestion-tag { font-size: 9px; color: var(--muted); margin-top: 2px; }
 
/* Share options */
.share-options { display: flex; flex-direction: column; gap: 8px; margin: 0 1.25rem; }
.share-opt {
  background: #fff;
  border: 1.5px solid var(--lilac);
  border-radius: 10px;
  padding: .9rem 1rem;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: flex-start; gap: 10px;
}
.share-opt:hover { border-color: var(--purple); background: var(--pale); }
.share-opt.selected { border-color: var(--purple); background: var(--pale); }
.share-opt-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.share-opt-title { font-size: 13px; font-weight: 500; color: var(--plum); margin-bottom: 2px; }
.share-opt-desc  { font-size: 11px; color: var(--muted); line-height: 1.45; }
 
/* Summary / output */
.summary-card { margin: .75rem 1.25rem 0; background: #fff; border-radius: 14px; border: .5px solid var(--lilac); overflow: hidden; }
.summary-hdr { background: var(--plum); padding: 1.25rem; }
.summary-hdr-name { font-size: 16px; font-weight: 500; color: #fff; margin-bottom: 2px; }
.summary-hdr-sub  { font-size: 11px; color: var(--lilac); }
.summary-hdr-bih  { font-size: 10px; color: var(--yellow); margin-top: 6px; opacity: .75; }
.summary-body { padding: 1.1rem; display: flex; flex-direction: column; gap: 1rem; }
.summary-section-title { font-size: 10px; font-weight: 600; color: var(--purple); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
.summary-item { font-size: 12px; color: var(--plum); line-height: 1.55; padding: .5rem .75rem; background: var(--pale); border-radius: 7px; border-left: 3px solid var(--purple); margin-bottom: 4px; }
.summary-item.amber-item { background: var(--amber-bg); border-left-color: var(--amber); }
.summary-caveat { font-size: 10px; color: var(--muted); line-height: 1.55; background: var(--pale); border-radius: 7px; padding: 9px 11px; border: .5px solid var(--lilac); }
 
/* Nav */
.nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem 1.5rem; margin-top: auto; }
.btn-back { font-size: 12px; color: var(--muted); background: none; border: none; padding: 0; cursor: pointer; }
.btn-next { font-size: 13px; font-weight: 500; color: #fff; background: var(--purple); border: none; border-radius: 8px; padding: 10px 24px; transition: opacity .15s; cursor: pointer; }
.btn-next:hover { opacity: .88; }
.btn-next:disabled { opacity: .35; cursor: not-allowed; }
.btn-action { margin: .85rem 1.25rem 0; width: calc(100% - 2.5rem); background: var(--plum); color: var(--yellow); font-size: 13px; font-weight: 500; border: none; border-radius: 9px; padding: 14px; display: flex; align-items: center; justify-content: center; gap: 7px; cursor: pointer; transition: opacity .15s; }
.btn-action:hover { opacity: .9; }
.btn-action.secondary { background: var(--priv-bg); color: var(--priv); border: 1.5px solid var(--priv-bd); margin-top: .5rem; }
.btn-restart { margin: .6rem 1.25rem 0; width: calc(100% - 2.5rem); background: transparent; color: var(--muted); font-size: 12px; border: .5px solid var(--lilac); border-radius: 9px; padding: 10px; cursor: pointer; }
.spacer { height: 2.5rem; }
 
/* PDF loading */
.pdf-loading { position: fixed; inset: 0; background: rgba(27,0,46,.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 12px; }
.pdf-loading-text { font-size: 14px; color: var(--lilac); }
.pdf-spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,.2); border-top-color: var(--yellow); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
 
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; animation: none !important; } }
@media (max-width: 400px) { .tried-ratings { flex-direction: column; } }
</style>
</head>
<body>
<div class="shell">
  <header class="hdr">
    <div class="logo">Brain in Hand <span>· Self-Assessment</span></div>
    <div class="sc" id="sc" aria-live="polite">Step 1</div>
  </header>
  <div class="pips" id="pips" role="progressbar"></div>
  <main id="app" role="main"></main>
</div>
 
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* ── Recognition statements ─────────────────────────────────────────
   These are the "do any of these sound familiar?" tiles.
   Each has:
   - id: unique key
   - text: the human, recognisable statement
   - area: which work domain this maps to (hidden from user)
   - drillL1: first level follow-up question + options
   - drillL2: second level follow-up, keyed by L1 answer
   - tried: what people commonly try for this area
   - suggestions: what might help (JD-aware tags)
──────────────────────────────────────────────────────────────────── */
const RECOGNITIONS = [
  {
    id: 'behind',
    text: 'I feel like I\'m always behind no matter how hard I work',
    area: 'workload',
    drillL1: {
      q: 'What does that feel like in a typical day?',
      opts: [
        { id:'start',    text:'I spend a lot of time trying to figure out where to start' },
        { id:'pile',     text:'By the time I finish one thing, three more have appeared' },
        { id:'show',     text:'I work hard but I can\'t always show what I\'ve done' },
        { id:'initiate', text:'I know what needs doing but I can\'t make myself begin' },
        { id:'interrupt',text:'I get interrupted before I can finish anything' },
      ]
    },
    drillL2: {
      start:    { q:'When does that tend to happen most?', opts:[
        { id:'a', text:'When there\'s no clear priority and everything feels urgent' },
        { id:'b', text:'At the start of the week when I look at everything at once' },
        { id:'c', text:'When I\'m given something new before I\'ve finished what I\'m on' },
        { id:'d', text:'First thing in the morning before I\'ve settled' },
      ]},
      pile:     { q:'What tends to add to the pile most?', opts:[
        { id:'a', text:'Messages and requests that arrive without warning' },
        { id:'b', text:'Meetings that eat into the time I need to actually work' },
        { id:'c', text:'Tasks that turn out to be bigger than they first seemed' },
        { id:'d', text:'Things that get sent back to me to redo' },
      ]},
      show:     { q:'What makes it hard to show your work?', opts:[
        { id:'a', text:'A lot of what I do doesn\'t have a visible output' },
        { id:'b', text:'I spend time supporting others which isn\'t always seen' },
        { id:'c', text:'I work better in longer stretches — short tasks don\'t suit me' },
        { id:'d', text:'I find it hard to talk about what I\'ve done' },
      ]},
      initiate: { q:'What tends to get in the way of starting?', opts:[
        { id:'a', text:'I need to understand the whole picture before I can begin' },
        { id:'b', text:'The task feels too big and I don\'t know where to break in' },
        { id:'c', text:'I\'m worried about getting it wrong' },
        { id:'d', text:'There\'s too much else pulling at my attention' },
      ]},
      interrupt:{ q:'What interrupts you most?', opts:[
        { id:'a', text:'Messages and notifications I feel I have to respond to' },
        { id:'b', text:'Colleagues dropping by or messaging unexpectedly' },
        { id:'c', text:'Meetings scheduled in the middle of focused work time' },
        { id:'d', text:'My own mind pulling me to other things' },
      ]},
    },
    tried: [
      { id:'t1', text:'To-do lists or task management apps' },
      { id:'t2', text:'Time blocking or scheduling focused time' },
      { id:'t3', text:'Asking my manager to help prioritise' },
      { id:'t4', text:'Setting a timer and working in short bursts' },
      { id:'t5', text:'Turning off notifications during focused work' },
    ],
    suggestions: [
      { text:'A daily priority check-in with my manager — just 5 minutes to agree what matters most today', tags:['any'] },
      { text:'Protected focus time in my calendar that colleagues can see and respect', tags:['any'] },
      { text:'Tasks broken into smaller steps with a clear first action', tags:['any'] },
      { text:'A shared understanding of what\'s urgent vs what can wait', tags:['any'] },
      { text:'Notification-free periods agreed with the team', tags:['any'] },
    ]
  },
 
  {
    id: 'sunday',
    text: 'Sunday evenings feel heavy thinking about the week ahead',
    area: 'wellbeing',
    drillL1: {
      q: 'What tends to be on your mind on Sunday evenings?',
      opts: [
        { id:'people',  text:'Specific people or conversations I\'m dreading' },
        { id:'tasks',   text:'Tasks or deadlines I haven\'t finished' },
        { id:'unknown', text:'Not knowing what\'s coming — I just feel unsettled' },
        { id:'general', text:'A general heaviness that\'s hard to pin down' },
        { id:'energy',  text:'Knowing I won\'t have enough energy for what\'s ahead' },
      ]
    },
    drillL2: {
      people:  { q:'What is it about those interactions that feels hard?', opts:[
        { id:'a', text:'Someone who makes me feel anxious or on edge' },
        { id:'b', text:'A conversation I know I need to have but keep putting off' },
        { id:'c', text:'A situation where I\'m not sure what\'s expected of me' },
        { id:'d', text:'Feeling like I\'m being judged or evaluated' },
      ]},
      tasks:   { q:'What makes those tasks hard to leave behind?', opts:[
        { id:'a', text:'I can\'t switch off from work once I start thinking about it' },
        { id:'b', text:'I feel guilty when I haven\'t finished everything' },
        { id:'c', text:'I\'m worried about the consequences of not being on top of it' },
        { id:'d', text:'The tasks keep changing or getting added to' },
      ]},
      unknown: { q:'What would help you feel more settled?', opts:[
        { id:'a', text:'Knowing what\'s in my diary and what\'s expected of me' },
        { id:'b', text:'A clearer sense of priorities for the week' },
        { id:'c', text:'Knowing my manager is aware of my workload' },
        { id:'d', text:'Fewer surprises and more notice of things changing' },
      ]},
      general: { q:'When did this start feeling this way?', opts:[
        { id:'a', text:'It\'s always been like this in this job' },
        { id:'b', text:'Since something changed — a role change, new manager, restructure' },
        { id:'c', text:'Gradually over time as things have built up' },
        { id:'d', text:'I\'m not sure — it\'s hard to pinpoint' },
      ]},
      energy:  { q:'What drains your energy most during the week?', opts:[
        { id:'a', text:'Back-to-back interactions with little recovery time' },
        { id:'b', text:'Situations I find socially or emotionally demanding' },
        { id:'c', text:'The physical environment — noise, commute, stimulation' },
        { id:'d', text:'Uncertainty and not knowing what\'s coming' },

/* ── State ──────────────────────────────────────────────────────── */
const STAGES = ['welcome','checkin','recognise','drill','tried','suggestions','share','summary'];
let stage = 0;
let wellbeing = 50;
let jdLoaded = false;
let userName = '';
let userRole = '';
 
// Recognition answers: { id: 'yes'|'sometimes'|null }
let recognised = {};
RECOGNITIONS.forEach(r => { recognised[r.id] = null; });
 
// Drill answers: { recognitionId: { l1: optionId, l2: optionId } }
let drillAnswers = {};
RECOGNITIONS.forEach(r => { drillAnswers[r.id] = { l1: null, l2: null }; });
 
// Items to drill — built after recognition
let drillQueue = [];
let currentDrillIdx = 0;
 
// Tried ratings: { recognitionId: { triedItemId: 'helped'|'helped-bit'|'didnt'|'not-tried' } }
let triedRatings = {};
 
// Selected suggestions
let selectedSuggestions = {};
 
// Share choice
let shareChoice = null;
 
/* ── Computed ───────────────────────────────────────────────────── */
function getRecognised() {
  return RECOGNITIONS.filter(r => recognised[r.id] === 'yes' || recognised[r.id] === 'sometimes');
}
function wellbeingLabel(v) {
  if (v >= 80) return 'Genuinely okay right now';
  if (v >= 60) return 'Managing — some things are harder than others';
  if (v >= 40) return 'Finding it tough in places';
  if (v >= 20) return 'Struggling more than I\'d like to admit';
  return 'Really hard at the moment';
}
function wellbeingDesc(v) {
  if (v >= 80) return 'That\'s good to know. This tool can still help you put words to what works well — and spot anything worth keeping an eye on.';
  if (v >= 60) return 'That\'s honest. Let\'s see if we can help you get more specific about the parts that are harder.';
  if (v >= 40) return 'That takes something to say. We\'ll go gently — you\'re in control of what you do with this.';
  if (v >= 20) return 'Thank you for being honest about that. This tool is designed for exactly this moment.';
  return 'That\'s a lot to be carrying. Take your time with this — there\'s no rush.';
}
function wellbeingColor(v) {
  if (v >= 60) return '#2E7D52';
  if (v >= 40) return '#7B5800';
  return '#C0392B';
}
 
/* ── Pip rendering ──────────────────────────────────────────────── */
function renderPips() {
  const el = document.getElementById('pips');
  el.innerHTML = '';
  const total = STAGES.length;
  STAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pip' + (i < stage ? ' done' : i === stage ? ' active' : '');
    el.appendChild(d);
  });
  const sc = document.getElementById('sc');
  const labels = ['Welcome','Check in','Recognition','Explore','What\'s been tried','Suggestions','Sharing','Summary'];
  sc.textContent = labels[stage] || '';
}
 
/* ── Navigation ─────────────────────────────────────────────────── */
function goNext() {
  if (stage === 1) {
    // After check-in, go to recognition
    stage = 2; render(); return;
  }
  if (stage === 2) {
    // After recognition, build drill queue and go to drill
    drillQueue = getRecognised();
    currentDrillIdx = 0;
    if (drillQueue.length === 0) { stage = 5; render(); return; }
    stage = 3; render(); return;
  }
  if (stage === 3) {
    // Move through drill items
    currentDrillIdx++;
    if (currentDrillIdx >= drillQueue.length) {
      stage = 4; render(); return;
    }
    render(); return;
  }
  if (stage === 4) {
    stage = 5; render(); return;
  }
  if (stage === 5) {
    stage = 6; render(); return;
  }
  if (stage === 6) {
    stage = 7; render(); return;
  }
  stage = Math.min(stage + 1, STAGES.length - 1);
  render();
}
 
function goBack() {
  if (stage === 3 && currentDrillIdx > 0) {
    currentDrillIdx--;
    render(); return;
  }
  if (stage === 3 && currentDrillIdx === 0) {
    stage = 2; render(); return;
  }
  if (stage > 0) { stage--; render(); }
}
 
/* ── Stage renderers ────────────────────────────────────────────── */

function renderRecognise() {
  const tileHtml = RECOGNITIONS.map(r => {
    const state = recognised[r.id];
    const cls = state === 'yes' ? ' yes' : state === 'sometimes' ? ' sometimes' : '';
    const stateLabel = state === 'yes' ? 'Yes' : state === 'sometimes' ? 'Sometimes' : '';
    return `<div class="recog-tile${cls}" onclick="cycleRecog('${r.id}')" role="button" tabindex="0" aria-label="${r.text}: ${stateLabel||'not selected'}">
      <div class="recog-dot"><div class="recog-dot-inner"></div></div>
      <div class="recog-text">${r.text}</div>
      ${state ? `<div class="recog-state">${stateLabel}</div>` : ''}
    </div>`;
  }).join('');
 
  const selCount = getRecognised().length;
 
  return `
    <div class="s-eyebrow">Recognition</div>
    <div class="s-head">Do any of these sound familiar?</div>
    <div class="s-warm">You don\'t need to know why — just whether you recognise it.</div>
    <div class="s-sub">Tap once for "yes, that\'s me." Tap again for "sometimes." Tap a third time to clear.</div>
    <div class="recog-legend">
      <div class="recog-leg-item"><div class="recog-leg-dot" style="background:var(--purple)"></div>Yes, this is me</div>
      <div class="recog-leg-item"><div class="recog-leg-dot" style="background:var(--amber)"></div>Sometimes</div>
      <div class="recog-leg-item"><div class="recog-leg-dot" style="background:#DDD3E8"></div>Not selected</div>
    </div>
    <div class="recog-grid">${tileHtml}</div>
    ${selCount > 0 ? `<div class="note-box note-green" style="margin-top:.5rem">You\'ve identified ${selCount} thing${selCount!==1?'s':''} — the next step helps you get more specific about each one.</div>` : ''}
    <div class="nav">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <button class="btn-next" onclick="goNext()" ${selCount===0?'disabled':''}>Explore these →</button>
    </div>
    <div class="spacer"></div>`;
}
 
function renderDrill() {
  const item = drillQueue[currentDrillIdx];
  if (!item) { goNext(); return ''; }
 
  const da = drillAnswers[item.id];
  const l1Done = da.l1 !== null;
  const l2Done = da.l2 !== null;
  const total = drillQueue.length;
  const stateLabel = recognised[item.id] === 'yes' ? 'You said: yes, this is me' : 'You said: sometimes';
 
  let html = `
    <div class="s-eyebrow">Exploring — ${currentDrillIdx + 1} of ${total}</div>
    <div class="s-head">Let\'s get more specific</div>
    <div class="s-warm">The more specific we can get, the more useful this will be.</div>
    <div class="drill-progress">
      <div class="drill-pips">
        ${drillQueue.map((_,i) => `<div class="drill-pip${i<currentDrillIdx?' done':i===currentDrillIdx?' active':''}"></div>`).join('')}
      </div>
      <div class="drill-progress-text">${currentDrillIdx+1} of ${total}</div>
    </div>`;
 
  // Level 1
  html += `<div class="drill-card">
    <div class="drill-context"><strong>${stateLabel}:</strong> "${item.text}"</div>
    <div class="drill-q">${item.drillL1.q}</div>
    <div class="drill-options">
      ${item.drillL1.opts.map(o => `
        <div class="drill-opt${da.l1===o.id?' selected':''}" onclick="setDrillL1('${item.id}','${o.id}')">
          <div class="drill-opt-dot"><div class="drill-opt-inner"></div></div>
          <div class="drill-opt-text">${o.text}</div>
        </div>`).join('')}
    </div>
  </div>`;
 
  // Level 2 — only shows after L1 is answered
  if (l1Done && item.drillL2[da.l1]) {
    const l2 = item.drillL2[da.l1];
    html += `<div class="drill-card">
      <div class="drill-context">And going a bit deeper...</div>
      <div class="drill-q">${l2.q}</div>
      <div class="drill-options">
        ${l2.opts.map(o => `
          <div class="drill-opt${da.l2===o.id?' selected':''}" onclick="setDrillL2('${item.id}','${o.id}')">
            <div class="drill-opt-dot"><div class="drill-opt-inner"></div></div>
            <div class="drill-opt-text">${o.text}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }
 
  const canNext = l1Done && (l2Done || !item.drillL2[da.l1]);
  const isLast = currentDrillIdx >= drillQueue.length - 1;
 
  html += `<div class="nav">
    <button class="btn-back" onclick="goBack()">← Back</button>
    <button class="btn-next" onclick="goNext()" ${canNext?'':'disabled'}>${isLast?'What\'s been tried →':'Next →'}</button>
  </div><div class="spacer"></div>`;
 
  return html;
}
 
function renderTried() {
  const items = getRecognised();
  if (items.length === 0) { goNext(); return ''; }
 
  let html = `
    <div class="s-eyebrow">What\'s been tried</div>
    <div class="s-head">Before we look at what might help...</div>
    <div class="s-warm">What have you already tried? This stops us suggesting things that haven\'t worked.</div>
    <div class="s-sub">Rate each one honestly — "didn\'t help" is just as useful as "helped a lot."</div>`;
 
  items.forEach(item => {
    if (!triedRatings[item.id]) triedRatings[item.id] = {};
    html += `<div style="padding:0 1.25rem .35rem">
      <div style="font-size:10px;font-weight:600;color:var(--purple);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">${item.area.toUpperCase().replace('_',' ')}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.4;font-style:italic">"${item.text}"</div>
    </div>
    <div class="tried-section">`;
    item.tried.forEach(t => {
      const rating = triedRatings[item.id][t.id];
      html += `<div class="tried-item">
        <div class="tried-item-text">${t.text}</div>
        <div class="tried-ratings">
          <div class="tried-rating${rating==='helped'?' helped':''}" onclick="setTried('${item.id}','${t.id}','helped')">Helped a lot</div>
          <div class="tried-rating${rating==='helped-bit'?' helped-bit':''}" onclick="setTried('${item.id}','${t.id}','helped-bit')">Helped a bit</div>
          <div class="tried-rating${rating==='didnt'?' didnt':''}" onclick="setTried('${item.id}','${t.id}','didnt')">Didn\'t help</div>
          <div class="tried-rating${rating==='not-tried'?' not-tried':''}" onclick="setTried('${item.id}','${t.id}','not-tried')">Haven\'t tried</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
 
  html += `<div class="nav">
    <button class="btn-back" onclick="goBack()">← Back</button>
    <button class="btn-next" onclick="goNext()">What might help →</button>
  </div><div class="spacer"></div>`;
  return html;
}
 
function renderSuggestions() {
  const items = getRecognised();
  let html = `
    <div class="s-eyebrow">What might help</div>
    <div class="s-head">Some things worth exploring</div>
    <div class="s-warm">These are starting points for a conversation — not a list of demands.</div>
    <div class="s-sub">Select the ones that feel relevant. These will appear in your summary.</div>
    <div class="note-box note-warm">Not everything here will be possible in every role or workplace. These are conversation starters — your employer\'s usual processes will determine what can be agreed.</div>`;
 
  items.forEach(item => {
    if (!selectedSuggestions[item.id]) selectedSuggestions[item.id] = {};
    const alreadyWorking = item.tried.filter(t => triedRatings[item.id]?.[t.id] === 'helped');
    html += `<div style="padding:.5rem 1.25rem .25rem">
      <div style="font-size:10px;font-weight:600;color:var(--purple);letter-spacing:.08em;text-transform:uppercase">${item.text.slice(0,50)}${item.text.length>50?'...':''}</div>
    </div>`;
    if (alreadyWorking.length > 0) {
      html += `<div class="note-box note-green" style="margin-bottom:4px">Already helping: ${alreadyWorking.map(t=>t.text).join(', ')}</div>`;
    }
    html += `<div class="suggestion-grid">`;
    item.suggestions.forEach((s, si) => {
      const key = `${item.id}-${si}`;
      const isSel = selectedSuggestions[item.id][si];
      html += `<div class="suggestion-item${isSel?' selected':''}" onclick="toggleSuggestion('${item.id}',${si})">
        <div class="suggestion-dot"><div class="suggestion-dot-inner"></div></div>
        <div>
          <div class="suggestion-text">${s.text}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
 
  html += `<div class="nav">
    <button class="btn-back" onclick="goBack()">← Back</button>
    <button class="btn-next" onclick="goNext()">What do I do with this? →</button>
  </div><div class="spacer"></div>`;
  return html;
}

    <div class="s-head">What do you want to do with this?</div>
    <div class="s-warm">You\'re in complete control of who sees this — and when.</div>
    <div class="s-sub" style="padding-bottom:.75rem">There\'s no right answer. Sometimes just having it written down for yourself is enough to start with.</div>
    <div class="share-options">
      <div class="share-opt${shareChoice==='private'?' selected':''}" onclick="setShare('private')">
        <div class="share-opt-icon">🔒</div>
        <div>
          <div class="share-opt-title">Keep it private for now</div>
          <div class="share-opt-desc">Download a PDF for yourself. You can decide what to do with it later.</div>
        </div>
      </div>
      <div class="share-opt${shareChoice==='manager'?' selected':''}" onclick="setShare('manager')">
        <div class="share-opt-icon">👤</div>
        <div>
          <div class="share-opt-title">Share a summary with my manager</div>
          <div class="share-opt-desc">A warm, non-accusatory summary designed to open a conversation — not make a complaint.</div>
        </div>
      </div>
      <div class="share-opt${shareChoice==='hr'?' selected':''}" onclick="setShare('hr')">
        <div class="share-opt-icon">🏢</div>
        <div>
          <div class="share-opt-title">Share with HR or a people team</div>
          <div class="share-opt-desc">A more structured summary suitable for a formal support conversation.</div>
        </div>
      </div>
      <div class="share-opt${shareChoice==='unsure'?' selected':''}" onclick="setShare('unsure')">
        <div class="share-opt-icon">💭</div>
        <div>
          <div class="share-opt-title">I\'m not sure yet</div>
          <div class="share-opt-desc">Download privately and sit with it. You don\'t have to decide now.</div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <button class="btn-next" onclick="goNext()" ${shareChoice?'':'disabled'}>Build my summary →</button>
    </div>
    <div class="spacer"></div>`;
}
 
function renderSummary() {
  const items = getRecognised();
  const allSuggestions = [];
  items.forEach(item => {
    item.suggestions.forEach((s, si) => {
      if (selectedSuggestions[item.id]?.[si]) allSuggestions.push(s.text);
    });
  });
 
  const drillSummary = items.map(item => {
    const da = drillAnswers[item.id];
    const l1opt = item.drillL1.opts.find(o => o.id === da.l1);
    const l2opts = da.l1 && item.drillL2[da.l1] ? item.drillL2[da.l1].opts : [];
    const l2opt = l2opts.find(o => o.id === da.l2);
    return { item, l1: l1opt, l2: l2opt };
  });
 
  const alreadyHelping = [];
  items.forEach(item => {
    item.tried.forEach(t => {
      if (triedRatings[item.id]?.[t.id] === 'helped') alreadyHelping.push(t.text);
    });
  });
 
  const shareLabel = shareChoice === 'manager' ? 'Prepared for a conversation with my manager'
    : shareChoice === 'hr' ? 'Prepared for a conversation with HR'
    : 'Private — for my own reflection';
 
  let html = `
    <div class="s-eyebrow" style="padding-top:1.25rem">Your summary</div>
    <div class="s-sub">Here\'s what you\'ve identified. Download it privately, or use it to start a conversation.</div>
    <div class="summary-card">
      <div class="summary-hdr">
        <div class="summary-hdr-name">Workplace Self-Assessment</div>
        <div class="summary-hdr-sub">${shareLabel}</div>
        <div class="summary-hdr-bih">Brain in Hand · ${new Date().toLocaleDateString('en-GB')}</div>
      </div>
      <div class="summary-body">
        <div>
          <div class="summary-section-title">How things are feeling</div>
          <div class="summary-item">${wellbeingLabel(wellbeing)}</div>
        </div>`;
 
  if (drillSummary.length) {
    html += `<div><div class="summary-section-title">Where I\'m finding things hard</div>`;
    drillSummary.forEach(({item, l1, l2}) => {
      html += `<div class="summary-item" style="margin-bottom:6px">
        <div style="font-weight:500;margin-bottom:3px">${item.text}</div>
        ${l1 ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">→ ${l1.text}</div>` : ''}
        ${l2 ? `<div style="font-size:11px;color:var(--muted);margin-top:1px">→ ${l2.text}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }
 
  if (alreadyHelping.length) {
    html += `<div><div class="summary-section-title">What\'s already helping</div>`;
    alreadyHelping.forEach(t => { html += `<div class="summary-item amber-item">${t}</div>`; });
    html += `</div>`;
  }
 
  if (allSuggestions.length) {
    html += `<div><div class="summary-section-title">What might help next</div>`;
    allSuggestions.forEach(s => { html += `<div class="summary-item">${s}</div>`; });
    html += `</div>`;
  }
 
  html += `<div class="summary-caveat">This self-assessment reflects personal experience and is not a medical assessment, formal adjustment request, or legal document. It does not replace Access to Work, Occupational Health, or any clinical support. It is designed to support a workplace conversation — your organisation\'s usual processes apply.</div>
      </div>
    </div>
    <button class="btn-action" onclick="downloadPDF()">⬇ Download my summary</button>
    <button class="btn-restart" onclick="restart()">Start again</button>
    <div class="spacer"></div>`;
 
  return html;
}
 
/* ── Event handlers ─────────────────────────────────────────────── */
function toggleJD() { jdLoaded = !jdLoaded; render(); }
function reRenderCheckin() { document.getElementById('app').innerHTML = renderCheckin(); }
 
function cycleRecog(id) {
  const cur = recognised[id];
  recognised[id] = cur === null ? 'yes' : cur === 'yes' ? 'sometimes' : null;
  render();
}
 
function setDrillL1(itemId, optId) {
  drillAnswers[itemId].l1 = optId;
  drillAnswers[itemId].l2 = null; // reset L2 when L1 changes
  render();
}
function setDrillL2(itemId, optId) {
  drillAnswers[itemId].l2 = optId;
  render();
}
 
function setTried(itemId, triedId, rating) {
  if (!triedRatings[itemId]) triedRatings[itemId] = {};
  triedRatings[itemId][triedId] = triedRatings[itemId][triedId] === rating ? null : rating;
  render();
}
 
function toggleSuggestion(itemId, si) {
  if (!selectedSuggestions[itemId]) selectedSuggestions[itemId] = {};
  selectedSuggestions[itemId][si] = !selectedSuggestions[itemId][si];
  render();
}
 
function setShare(choice) { shareChoice = choice; render(); }
 
/* ── PDF Generation ─────────────────────────────────────────────── */
async function downloadPDF() {
  const overlay = document.createElement('div');
  overlay.className = 'pdf-loading';
  overlay.innerHTML = `<div class="pdf-spinner"></div><div class="pdf-loading-text">Building your summary PDF\u2026</div>`;
  document.body.appendChild(overlay);
  await new Promise(r => setTimeout(r, 50));
 
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const W = 210; const M = 18; const col = W - M*2;
    let y = 0;
 
    const PLUM   = [27,0,46];
    const PURPLE = [142,60,206];
    const LILAC  = [234,193,255];
    const PALE   = [245,234,249];
    const YELLOW = [255,229,92];
    const MUTED  = [107,90,126];
    const AMBER  = [255,201,98];
    const GREEN  = [46,125,82];
    const GREEN_BG=[232,245,238];
 
    function clean(s) { return (s||'').replace(/[^\x20-\x7E\u00A0-\u00FF\u2013\u2014\u2018\u2019\u201C\u201D]/g,'').trim(); }
    function addPage() { doc.addPage(); y = M; }
    function checkBreak(n) { if (y + n > 282) addPage(); }
 
    function fillRect(x,ry,w,h,col,r=2) { doc.setFillColor(...col); doc.roundedRect(x,ry,w,h,r,r,'F'); }
    function strokeRect(x,ry,w,h,col,lw=0.3,r=2) {
      doc.setDrawColor(...col); doc.setLineWidth(lw);
      doc.roundedRect(x,ry,w,h,r,r,'D');
    }
 
    function sectionHead(label, sy) {
      checkBreak(14);
      doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(...PURPLE);
      doc.text(label.toUpperCase(), M, sy);
      doc.setDrawColor(...LILAC); doc.setLineWidth(0.3);
      doc.line(M, sy+1.5, W-M, sy+1.5);
      return sy + 7;
    }
 
    function summaryItem(text, sy, accentColor=PURPLE, bgColor=PALE) {
      checkBreak(16);
      const lines = doc.splitTextToSize(clean(text), col - 14);
      const h = Math.max(12, lines.length * 5 + 6);
      fillRect(M, sy, col, h, bgColor);
      doc.setFillColor(...accentColor);
      doc.rect(M, sy, 2.5, h, 'F');
      doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(...PLUM);
      doc.text(lines, M + 6, sy + 5.5);
      return sy + h + 3;
    }
 
    function drillItem(item, l1, l2, sy) {
      checkBreak(20);
      const titleLines = doc.splitTextToSize(clean(item.text), col - 10);
      let h = titleLines.length * 5 + 6;
      if (l1) h += 6;
      if (l2) h += 6;
      h = Math.max(h, 14);
 
      fillRect(M, sy, col, h, PALE);
      strokeRect(M, sy, col, h, LILAC);
 
      doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...PLUM);
      doc.text(titleLines, M + 4, sy + 5.5);
      let dy = sy + titleLines.length * 5 + 4;
 
      if (l1) {
        doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...PURPLE);
        const l1lines = doc.splitTextToSize('\u2192 ' + clean(l1.text), col - 10);
        doc.text(l1lines, M + 6, dy);
        dy += l1lines.length * 5;
      }
      if (l2) {
        doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...MUTED);
        const l2lines = doc.splitTextToSize('\u2192 ' + clean(l2.text), col - 12);
        doc.text(l2lines, M + 8, dy);
        dy += l2lines.length * 5;
      }
      return sy + h + 3;
    }
 
    /* Header */
    fillRect(0, 0, W, 38, PLUM, 0);
    doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
    doc.text('Workplace Self-Assessment', M, 16);
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...LILAC);
    const shareLabel = shareChoice==='manager'?'Prepared for a conversation with my manager'
      :shareChoice==='hr'?'Prepared for a conversation with HR'
      :'Private \u2014 for my own reflection';
    doc.text(shareLabel, M, 24);
    doc.setFontSize(7.5); doc.setTextColor(...YELLOW);
    doc.text('Brain in Hand  |  ' + new Date().toLocaleDateString('en-GB'), M, 31);
 
    y = 46;
 
    /* Wellbeing */
    y = sectionHead('How things are feeling', y);
    y = summaryItem(wellbeingLabel(wellbeing), y);
    y += 2;
 
    /* Drill summaries */
    const items = getRecognised();
    if (items.length) {
      y = sectionHead('Where I\'m finding things hard', y);
      items.forEach(item => {
        const da = drillAnswers[item.id];
        const l1 = item.drillL1.opts.find(o => o.id === da.l1);
        const l2opts = da.l1 && item.drillL2[da.l1] ? item.drillL2[da.l1].opts : [];
        const l2 = l2opts.find(o => o.id === da.l2);
        y = drillItem(item, l1, l2, y);
      });
      y += 2;
    }
 
    /* Already helping */
    const helping = [];
    items.forEach(item => {
      item.tried.forEach(t => {
        if (triedRatings[item.id]?.[t.id]==='helped') helping.push(t.text);
      });
    });
    if (helping.length) {
      y = sectionHead('What\'s already helping', y);
      helping.forEach(t => { y = summaryItem(t, y, GREEN, GREEN_BG); });
      y += 2;
    }
 
    /* Suggestions */
    const suggs = [];
    items.forEach(item => {
      item.suggestions.forEach((s,si) => {
        if (selectedSuggestions[item.id]?.[si]) suggs.push(s.text);
      });
    });
    if (suggs.length) {
      y = sectionHead('What might help next', y);
      suggs.forEach(s => { y = summaryItem(s, y, [255,201,98], [255,248,225]); });
      y += 2;
    }
 
    /* Caveat */
    checkBreak(22);
    fillRect(M, y, col, 18, PALE, 2);
    strokeRect(M, y, col, 18, LILAC);
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...MUTED);
    const cav = doc.splitTextToSize('This self-assessment reflects personal experience only. It is not a medical assessment, formal adjustment request, or legal document. It does not replace Access to Work, Occupational Health, or any clinical or legal process. It is designed to support a workplace conversation \u2014 your organisation\'s usual processes apply.', col-8);
    doc.text(cav, M+4, y+5);
 
    /* Footer */
    const pages = doc.getNumberOfPages();
    for (let i=1;i<=pages;i++) {
      doc.setPage(i);
      doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...MUTED);
      doc.text('Brain in Hand \u2014 Workplace Self-Assessment \u2014 ' + new Date().toLocaleDateString('en-GB'), M, 291);
      doc.text('Page ' + i + ' of ' + pages, W-M, 291, {align:'right'});
    }
 
    doc.save('workplace-self-assessment.pdf');
 
  } catch(err) {
    console.error('PDF error:', err);
    alert('Sorry \u2014 there was a problem creating your PDF. Please try again.');
  }
  document.body.removeChild(overlay);
}
 
/* ── Main render ────────────────────────────────────────────────── */
function render() {
  renderPips();
  window.scrollTo(0, 0);
  const app = document.getElementById('app');
  switch(STAGES[stage]) {
    case 'welcome':    app.innerHTML = renderWelcome();    break;
    case 'checkin':    app.innerHTML = renderCheckin();    break;
    case 'recognise':  app.innerHTML = renderRecognise();  break;
    case 'drill':      app.innerHTML = renderDrill();      break;
    case 'tried':      app.innerHTML = renderTried();      break;
    case 'suggestions':app.innerHTML = renderSuggestions();break;
    case 'share':      app.innerHTML = renderShare();      break;
    case 'summary':    app.innerHTML = renderSummary();    break;
  }
}
 
function restart() {
  stage = 0; wellbeing = 50; jdLoaded = false; shareChoice = null;
  userName = ''; userRole = '';
  RECOGNITIONS.forEach(r => { recognised[r.id] = null; drillAnswers[r.id] = {l1:null,l2:null}; });
  triedRatings = {}; selectedSuggestions = {};
  drillQueue = []; currentDrillIdx = 0;
  render();
}
 
document.addEventListener('keydown', e => {
  if (e.key==='Enter'||e.key===' ') {
    const t = e.target;
    if (['recog-tile','drill-opt','share-opt','suggestion-item'].some(c=>t.classList.contains(c))) {
      e.preventDefault(); t.click();
    }
  }
});
 
render();
</script>
