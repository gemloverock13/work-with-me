<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Explorer — Brain in Hand</title>
<meta name="description" content="A tool to help you explore what's working at work, what's harder than it needs to be, and what might help.">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --plum:   #1B002E;
  --purple: #8E3CCE;
  --lilac:  #EAC1FF;
  --pale:   #F5EAF9;
  --amber:  #FFC962;
  --yellow: #FFE95C;
  --bg:     #FAF9F5;
  --muted:  #6B5A7E;
  --green:  #2E7D52;
  --gbg:    #E8F5EE;
  --gbd:    #A8D5BC;
  --abg:    #FFF8E1;
  --abd:    #FFE082;
  --priv:   #4A6FA5;
  --pbg:    #EEF3FB;
  --pbd:    #B8CFEE;
}
body { font-family: system-ui,-apple-system,'Segoe UI',sans-serif; background:var(--bg); min-height:100vh; color:var(--plum); -webkit-font-smoothing:antialiased; }
button,input,textarea { font-family:inherit; }
.shell { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }

.hdr { background:var(--plum); padding:1.1rem 1.25rem .7rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { color:var(--yellow); font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }
.logo span { color:rgba(255,255,255,.4); font-weight:400; letter-spacing:0; text-transform:none; margin-left:5px; }
.sc { font-size:11px; color:rgba(255,255,255,.35); }
.pips { background:var(--plum); padding:0 1.25rem .9rem; display:flex; gap:4px; }
.pip { height:3px; border-radius:2px; flex:1; background:rgba(255,255,255,.15); transition:background .3s; }
.pip.done { background:var(--yellow); }
.pip.active { background:var(--lilac); }

.s-eyebrow { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--purple); padding:1.25rem 1.25rem .3rem; }
.s-head { font-size:20px; font-weight:500; color:var(--plum); padding:0 1.25rem .3rem; line-height:1.3; }
.s-warm { font-size:13px; color:var(--purple); padding:0 1.25rem .25rem; line-height:1.5; font-style:italic; }
.s-sub  { font-size:12px; color:var(--muted); padding:0 1.25rem .9rem; line-height:1.6; }

.card { margin:0 1.25rem 1rem; background:#fff; border-radius:12px; border:.5px solid var(--lilac); padding:1rem 1.1rem; }
.card p { font-size:12px; color:var(--muted); line-height:1.65; margin-bottom:.6rem; }
.card p:last-child { margin-bottom:0; }
.card strong { color:var(--plum); font-weight:500; }
.card-warm { background:var(--pale); border-color:var(--lilac); }

.note { margin:0 1.25rem .75rem; border-radius:8px; padding:9px 11px; font-size:11px; line-height:1.55; }
.note-warm  { background:#FFF8EC; border:.5px solid var(--amber); color:#6B4200; }
.note-green { background:var(--gbg); border:.5px solid var(--gbd); color:var(--green); }
.note-priv  { background:var(--pbg); border:.5px solid var(--pbd); color:var(--priv); }
.note-quiet { font-size:10px; color:#9B8AAA; padding:0 1.25rem .75rem; line-height:1.5; }

.jd-box { margin:0 1.25rem .75rem; border:1.5px dashed var(--lilac); border-radius:10px; padding:.85rem; background:#fff; cursor:pointer; display:flex; align-items:center; gap:9px; transition:border-color .15s; }
.jd-box:hover { border-color:var(--purple); }
.jd-icon { width:34px; height:34px; border-radius:8px; background:var(--pale); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.jd-badge { font-size:10px; background:var(--amber); color:var(--plum); padding:2px 7px; border-radius:20px; font-weight:500; }

/* Spectrum */
.spectrum-wrap { margin:0 1.25rem 1rem; }
.spectrum-track { position:relative; height:48px; background:linear-gradient(to right,var(--gbg),var(--abg),#FFF5F5); border-radius:24px; border:.5px solid var(--lilac); overflow:hidden; margin-bottom:.5rem; }
input[type=range].spectrum { position:absolute; inset:0; width:100%; height:100%; appearance:none; background:transparent; cursor:pointer; padding:0 16px; }
input[type=range].spectrum::-webkit-slider-thumb { appearance:none; width:32px; height:32px; border-radius:50%; background:var(--plum); border:3px solid #fff; box-shadow:0 2px 8px rgba(27,0,46,.25); cursor:pointer; }
input[type=range].spectrum::-moz-range-thumb { width:32px; height:32px; border-radius:50%; background:var(--plum); border:3px solid #fff; cursor:pointer; }
.spectrum-ends { display:flex; justify-content:space-between; }
.spectrum-ends span { font-size:10px; color:var(--muted); }
.spectrum-label { font-size:13px; font-weight:500; text-align:center; margin-bottom:4px; padding:0 1.25rem; }

/* Group intro card */
.group-intro { margin:0 1.25rem .75rem; border-radius:12px; overflow:hidden; border:.5px solid var(--lilac); }
.group-intro-hdr { background:var(--plum); padding:.75rem 1rem; }
.group-intro-title { font-size:13px; font-weight:500; color:var(--yellow); }
.group-intro-sub { font-size:11px; color:rgba(255,255,255,.5); margin-top:2px; }
.group-intro-body { background:#fff; padding:.75rem 1rem; font-size:12px; color:var(--muted); line-height:1.6; }

/* Recognition tiles — full width, statement style */
.recog-list { display:flex; flex-direction:column; gap:6px; padding:0 1.25rem .5rem; }
.recog-tile { background:#fff; border:1.5px solid #EDE0F5; border-radius:10px; padding:10px 12px; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.recog-tile:hover { border-color:var(--lilac); background:var(--pale); }
.recog-tile.yes { border-color:var(--purple); background:var(--pale); }
.recog-tile.sometimes { border-color:var(--amber); background:var(--abg); }
.recog-top { display:flex; align-items:center; gap:10px; }
.recog-dot { width:20px; height:20px; border-radius:50%; border:1.5px solid #DDD3E8; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.recog-tile.yes .recog-dot { background:var(--purple); border-color:var(--purple); }
.recog-tile.sometimes .recog-dot { background:var(--amber); border-color:var(--amber); }
.recog-dot-in { width:8px; height:8px; border-radius:50%; background:#fff; opacity:0; transition:opacity .15s; }
.recog-tile.yes .recog-dot-in,
.recog-tile.sometimes .recog-dot-in { opacity:1; }
.recog-text { font-size:12px; color:var(--plum); line-height:1.45; flex:1; }
.recog-lbl { font-size:9px; font-weight:600; flex-shrink:0; }
.recog-tile.yes .recog-lbl { color:var(--purple); }
.recog-tile.sometimes .recog-lbl { color:#7B5800; }

/* Share toggle under tile */
.share-row { display:flex; gap:5px; margin-top:8px; padding-top:8px; border-top:.5px solid var(--lilac); align-items:center; flex-wrap:wrap; }
.share-row-lbl { font-size:10px; color:var(--muted); flex-shrink:0; }
.stog { font-size:10px; padding:3px 9px; border-radius:20px; cursor:pointer; border:1px solid transparent; transition:all .12s; background:var(--pale); color:var(--muted); }
.stog:hover { border-color:var(--lilac); }
.stog.pub  { background:var(--purple); color:#fff; border-color:var(--purple); }
.stog.priv { background:var(--pbg); color:var(--priv); border-color:var(--pbd); }

.recog-legend { display:flex; gap:8px; padding:0 1.25rem .6rem; flex-wrap:wrap; }
.rl { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--muted); }
.rl-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* Drill */
.drill-prog { display:flex; align-items:center; gap:8px; padding:0 1.25rem .5rem; }
.drill-pips { display:flex; gap:4px; }
.dpip { width:6px; height:6px; border-radius:50%; background:#DDD3E8; }
.dpip.done { background:var(--purple); }
.dpip.active { background:var(--lilac); border:1.5px solid var(--purple); }
.drill-prog-txt { font-size:11px; color:var(--muted); }

.drill-card { margin:0 1.25rem .75rem; background:#fff; border-radius:12px; border:.5px solid var(--lilac); overflow:hidden; }
.drill-ctx { background:var(--pale); padding:.75rem 1rem; font-size:12px; color:var(--muted); border-bottom:.5px solid var(--lilac); line-height:1.5; }
.drill-ctx strong { color:var(--purple); font-weight:500; }
.drill-q { font-size:14px; font-weight:500; color:var(--plum); padding:.9rem 1rem .5rem; line-height:1.4; }
.drill-hint { font-size:11px; color:var(--muted); padding:0 1rem .7rem; font-style:italic; }
.drill-opts { display:flex; flex-direction:column; }
.drill-opt { display:flex; align-items:center; gap:10px; padding:.65rem 1rem; cursor:pointer; border-top:.5px solid var(--pale); transition:background .12s; -webkit-tap-highlight-color:transparent; }
.drill-opt:hover { background:var(--pale); }
.drill-opt.sel { background:var(--pale); }
.dopt-dot { width:18px; height:18px; border-radius:4px; border:1.5px solid var(--lilac); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.drill-opt.sel .dopt-dot { background:var(--purple); border-color:var(--purple); }
.dopt-in { width:8px; height:8px; border-radius:2px; background:#fff; opacity:0; transition:opacity .15s; }
.drill-opt.sel .dopt-in { opacity:1; }
.dopt-txt { font-size:12px; color:var(--plum); line-height:1.4; flex:1; }

/* Free text */
.free-text-wrap { margin:0 1.25rem .75rem; }
.free-text-label { font-size:11px; color:var(--muted); margin-bottom:5px; }
textarea.free-text { width:100%; border:1.5px solid var(--lilac); border-radius:10px; padding:.75rem; font-size:12px; color:var(--plum); background:#fff; resize:none; outline:none; line-height:1.55; transition:border-color .15s; }
textarea.free-text:focus { border-color:var(--purple); }
textarea.free-text::placeholder { color:#C0B0D0; }

/* Tried */
.tried-item { margin:0 1.25rem 8px; background:#fff; border:.5px solid var(--lilac); border-radius:10px; padding:.85rem 1rem; }
.tried-text { font-size:12px; color:var(--plum); margin-bottom:.6rem; line-height:1.4; }
.tried-ratings { display:flex; gap:6px; flex-wrap:wrap; }
.trat { font-size:11px; padding:4px 10px; border-radius:20px; cursor:pointer; border:1.5px solid transparent; transition:all .15s; background:var(--pale); color:var(--muted); }
.trat:hover { border-color:var(--lilac); }
.trat.helped     { background:var(--gbg); border-color:var(--gbd); color:var(--green); }
.trat.helped-bit { background:var(--abg); border-color:var(--abd); color:#7B5800; }
.trat.didnt      { background:#FFF5F5; border-color:#FFCDD2; color:#8B2020; }
.trat.not-tried  { background:var(--pale); border-color:var(--lilac); color:var(--muted); }
.tried-section-hdr { padding:.5rem 1.25rem .25rem; font-size:10px; font-weight:600; color:var(--purple); letter-spacing:.08em; text-transform:uppercase; }
.tried-context { padding:0 1.25rem .35rem; font-size:11px; color:var(--muted); font-style:italic; line-height:1.4; }

/* Suggestions */
.sug-grid { display:flex; flex-direction:column; gap:6px; padding:0 1.25rem .5rem; }
.sug-item { background:#fff; border:1.5px solid #EDE0F5; border-radius:10px; padding:10px 12px; display:flex; align-items:flex-start; gap:10px; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.sug-item:hover { border-color:var(--lilac); }
.sug-item.sel { border-color:var(--purple); background:var(--pale); }
.sug-dot { width:18px; height:18px; border-radius:50%; border:1.5px solid #DDD3E8; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.sug-item.sel .sug-dot { background:var(--purple); border-color:var(--purple); }
.sug-dot-in { width:8px; height:8px; border-radius:50%; background:#fff; opacity:0; transition:opacity .15s; }
.sug-item.sel .sug-dot-in { opacity:1; }
.sug-text { font-size:12px; color:var(--plum); line-height:1.4; flex:1; }

/* Summary */
.summary-card { margin:.75rem 1.25rem 0; background:#fff; border-radius:14px; border:.5px solid var(--lilac); overflow:hidden; }
.sum-hdr { background:var(--plum); padding:1.25rem; }
.sum-hdr-title { font-size:16px; font-weight:500; color:#fff; margin-bottom:2px; }
.sum-hdr-sub   { font-size:11px; color:var(--lilac); }
.sum-hdr-bih   { font-size:10px; color:var(--yellow); margin-top:6px; opacity:.75; }
.sum-body { padding:1.1rem; display:flex; flex-direction:column; gap:1rem; }
.sum-st { font-size:10px; font-weight:600; color:var(--purple); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
.sum-para { font-size:12px; color:var(--plum); line-height:1.7; background:var(--pale); border-radius:8px; padding:.75rem .9rem; border-left:3px solid var(--purple); }
.sum-para.green-p { background:var(--gbg); border-left-color:var(--green); }
.sum-para.amber-p { background:var(--abg); border-left-color:var(--amber); }
.sum-para.priv-p  { background:var(--pbg); border-left-color:var(--priv); }
.sum-item { font-size:12px; color:var(--plum); line-height:1.55; padding:.45rem .75rem .45rem .9rem; background:var(--pale); border-radius:7px; border-left:3px solid var(--purple); margin-bottom:3px; }
.sum-item.green-i { background:var(--gbg); border-left-color:var(--green); }
.sum-item.amber-i { background:var(--abg); border-left-color:var(--amber); }
.sum-item.priv-i  { background:var(--pbg); border-left-color:var(--priv); }
.sum-drill { margin-bottom:6px; padding:.65rem .9rem; background:var(--pale); border-radius:8px; border-left:3px solid var(--purple); }
.sum-drill-text { font-size:12px; font-weight:500; color:var(--plum); line-height:1.4; }
.sum-drill-l1 { font-size:11px; color:var(--purple); margin-top:3px; line-height:1.4; }
.sum-drill-l2 { font-size:11px; color:var(--muted); margin-top:2px; line-height:1.4; }
.sum-caveat { font-size:10px; color:var(--muted); line-height:1.55; background:var(--pale); border-radius:7px; padding:9px 11px; border:.5px solid var(--lilac); }

/* Nav */
.nav { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem 1.5rem; margin-top:auto; }
.btn-back { font-size:12px; color:var(--muted); background:none; border:none; padding:0; cursor:pointer; }
.btn-next { font-size:13px; font-weight:500; color:#fff; background:var(--purple); border:none; border-radius:8px; padding:10px 24px; transition:opacity .15s; cursor:pointer; }
.btn-next:hover { opacity:.88; }
.btn-next:disabled { opacity:.35; cursor:not-allowed; }
.btn-action { margin:.85rem 1.25rem 0; width:calc(100% - 2.5rem); background:var(--plum); color:var(--yellow); font-size:13px; font-weight:500; border:none; border-radius:9px; padding:14px; display:flex; align-items:center; justify-content:center; gap:7px; cursor:pointer; transition:opacity .15s; }
.btn-action:hover { opacity:.9; }
.btn-restart { margin:.6rem 1.25rem 0; width:calc(100% - 2.5rem); background:transparent; color:var(--muted); font-size:12px; border:.5px solid var(--lilac); border-radius:9px; padding:10px; cursor:pointer; }
.spacer { height:2.5rem; }

.share-options { display:flex; flex-direction:column; gap:8px; margin:0 1.25rem; }
.share-opt { background:#fff; border:1.5px solid var(--lilac); border-radius:10px; padding:.9rem 1rem; cursor:pointer; transition:all .15s; display:flex; align-items:flex-start; gap:10px; -webkit-tap-highlight-color:transparent; }
.share-opt:hover { border-color:var(--purple); background:var(--pale); }
.share-opt.sel { border-color:var(--purple); background:var(--pale); }
.share-opt-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.share-opt-title { font-size:13px; font-weight:500; color:var(--plum); margin-bottom:2px; }
.share-opt-desc  { font-size:11px; color:var(--muted); line-height:1.45; }

.pdf-loading { position:fixed; inset:0; background:rgba(27,0,46,.7); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:12px; }
.pdf-loading-text { font-size:14px; color:var(--lilac); }
.pdf-spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,.2); border-top-color:var(--yellow); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
@media (prefers-reduced-motion:reduce) { *,*::before,*::after { transition:none !important; animation:none !important; } }

/* TTS indicator */
.tts-reading #tts-btn { color:var(--yellow) !important; }
.tts-reading #tts-wave2 { opacity:1 !important; }
@keyframes wave-pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.tts-reading #tts-wave1 { animation:wave-pulse 1s ease-in-out infinite; }
.tts-reading #tts-wave2 { animation:wave-pulse 1s ease-in-out infinite .3s; }

.tts-bar {
  background:rgba(142,60,206,.15);
  border-bottom:.5px solid var(--lilac);
  padding:6px 1.25rem;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:var(--purple);
}
.tts-bar.hidden { display:none; }
</style>
</head>
<body>
<div class="shell">
  <header class="hdr">
    <div class="logo">Brain in Hand <span>· Work Explorer</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="tts-btn" onclick="toggleTTS()" aria-label="Read this page aloud"
        title="Read aloud" style="background:none;border:none;cursor:pointer;padding:4px;
        border-radius:50%;display:flex;align-items:center;justify-content:center;
        transition:background .15s;color:rgba(255,255,255,.5);"
        onmouseover="this.style.background='rgba(255,255,255,.1)'"
        onmouseout="this.style.background='none'">
        <svg id="tts-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path id="tts-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path id="tts-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14" opacity="0"/>
        </svg>
      </button>
      <div class="sc" id="sc" aria-live="polite"></div>
    </div>
  </header>
  <div class="pips" id="pips" role="progressbar"></div>
  <div class="tts-bar hidden" id="tts-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <span id="tts-bar-text">Reading aloud...</span>
    <button onclick="stopTTS()" style="margin-left:auto;background:none;border:none;
      cursor:pointer;font-size:11px;color:var(--purple);text-decoration:underline;padding:0">
      Stop
    </button>
  </div>
  <main id="app" role="main"></main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* ── Data ───────────────────────────────────────────────────────────
   group: 'me' = personal experience | 'env' = working environment
   drillL1: multi-select
   drillL2: keyed by L1 option id, multi-select
   tried: positive strategies only — no harmful coping
   suggestions: conversation starters
──────────────────────────────────────────────────────────────────── */
const ITEMS = [

  /* ── How things feel for me ── */
  {
    id:'harder', group:'me',
    text:'There are parts of my role I find consistently harder than others',
    drillL1:{ q:'What kinds of things tend to be harder?', hint:'Select everything that feels true — you can pick more than one.', opts:[
      {id:'tasks',    text:'Certain types of task — some feel much harder than others'},
      {id:'people',   text:'Certain interactions or situations involving other people'},
      {id:'starting', text:'Getting started — initiating things is harder than doing them'},
      {id:'finishing',text:'Finishing things off and closing them out'},
      {id:'unclear',  text:'Things that aren\'t clearly defined — I need more structure than I\'m given'},
      {id:'explain',  text:'It\'s hard to explain — I just notice some things cost me more than they seem to cost others'},
    ]},
    drillL2:{
      tasks:    {q:'What makes those tasks harder?', opts:[
        {id:'a', text:'They involve a type of thinking or skill I find difficult'},
        {id:'b', text:'They\'re not clearly defined and I\'m not sure what\'s needed'},
        {id:'c', text:'They take much longer for me than they seem to for others'},
        {id:'d', text:'The stakes feel high and I worry about getting them wrong'},
      ]},
      people:   {q:'What makes those situations harder?', opts:[
        {id:'a', text:'I find it hard to read what\'s expected of me in the moment'},
        {id:'b', text:'Tension or conflict is hard for me to navigate'},
        {id:'c', text:'Certain settings — particularly groups — take a lot out of me'},
        {id:'d', text:'I find it hard to say what I need to say when it matters'},
      ]},
      starting: {q:'What tends to get in the way of starting?', opts:[
        {id:'a', text:'I need to understand the full picture before I can begin'},
        {id:'b', text:'The task feels too big and I don\'t know how to break into it'},
        {id:'c', text:'I\'m not sure I\'m heading in the right direction'},
        {id:'d', text:'There\'s too much else pulling at my attention'},
      ]},
      finishing:{q:'What makes it hard to close things off?', opts:[
        {id:'a', text:'Something always seems to arrive before I can finish'},
        {id:'b', text:'I\'m not sure when something is good enough to stop'},
        {id:'c', text:'I lose momentum and find it hard to pick back up'},

let recognised  = {};  // id -> null|'yes'|'sometimes'
let shareChoice = {};  // id -> null|'share'|'private'
let drillL1     = {};  // id -> Set of optIds
let drillL2     = {};  // id -> { optId: Set of l2optIds }
let drillFree   = {};  // id -> string
let triedRatings= {};  // id -> { triedId: rating }
let triedFree   = {};  // id -> string
let selectedSugs= {};  // id -> { si: bool }

ITEMS.forEach(r => {
  recognised[r.id]   = null;
  shareChoice[r.id]  = null;
  drillL1[r.id]      = new Set();
  drillL2[r.id]      = {};
  drillFree[r.id]    = '';
  triedRatings[r.id] = {};
  triedFree[r.id]    = '';
  selectedSugs[r.id] = {};
});

let drillQueue = [];
let drillIdx   = 0;
let shareDecision = null;

/* ── Computed ───────────────────────────────────────────────────── */
function getRecognised() {
  return ITEMS.filter(r => recognised[r.id] === 'yes' || recognised[r.id] === 'sometimes');
}
function getShared()  { return getRecognised().filter(r => shareChoice[r.id] === 'share'); }
function getPrivate() { return getRecognised().filter(r => shareChoice[r.id] !== 'share'); }

function wbLabel(v) {
  if (v >= 80) return 'Things are going pretty well right now.';
  if (v >= 60) return 'Things are okay, though some parts are harder than others.';
  if (v >= 40) return 'Some things are tougher than they could be right now.';
  if (v >= 20) return 'Things are harder than I\'d like to admit at the moment.';
  return 'Things are really hard at the moment.';
}
function wbDesc(v) {
  if (v >= 80) return 'That\'s good to hear. Even when things are going well, this tool can help you put words to what\'s working — and notice anything worth keeping an eye on.';
  if (v >= 60) return 'That\'s an honest place to start. The next steps can help you get more specific about the parts that are harder than they could be.';
  if (v >= 40) return 'That takes something to say. Take this at your own pace — you\'re in control of everything that happens with it.';
  if (v >= 20) return 'Thank you for being honest about that. That\'s exactly what this is here for.';
  return 'That\'s a lot to be sitting with. Take your time — there\'s no rush with any of this.';
}
function wbColor(v) {
  if (v >= 60) return '#2E7D52';
  if (v >= 40) return '#7B5800';
  return '#C0392B';
}

function clean(s) {
  return (s||'').replace(/[^\x20-\x7E\u00A0-\u00FF\u2013\u2014\u2018\u2019\u201C\u201D]/g,'').trim();
}

/* ── Pips ───────────────────────────────────────────────────────── */
function renderPips() {
  const el = document.getElementById('pips');
  el.innerHTML = '';
  STAGES.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'pip'+(i<stage?' done':i===stage?' active':'');
    el.appendChild(d);
  });
  const labels = ['Welcome','Check in','Your experience','Your environment','Exploring','What\'s helped','What might help','Sharing','Your summary'];
  document.getElementById('sc').textContent = labels[stage]||'';
}

/* ── Navigation ─────────────────────────────────────────────────── */
function goNext() {
  if (stage === 3) { // after recog-env, build drill queue
    drillQueue = getRecognised();
    drillIdx = 0;
    stage = drillQueue.length > 0 ? 4 : 5;
    render(); return;
  }
  if (stage === 4) {
    drillIdx++;
    if (drillIdx >= drillQueue.length) { stage = 5; }
    render(); return;
  }
  stage = Math.min(stage+1, STAGES.length-1);
  render();
}
function goBack() {
  if (stage === 4 && drillIdx > 0) { drillIdx--; render(); return; }
  if (stage === 4 && drillIdx === 0) { stage = 3; render(); return; }
  if (stage > 0) { stage--; render(); }
}

/* ── Renderers ──────────────────────────────────────────────────── */

function renderRecogGroup(group) {
  const items = ITEMS.filter(r => r.group === group);
  const isMe  = group === 'me';
  const selCount = getRecognised().length;

  function tileHtml(r) {
    const state = recognised[r.id];
    const cls   = state === 'yes' ? ' yes' : state === 'sometimes' ? ' sometimes' : '';
    const lbl   = state === 'yes' ? 'Yes' : state === 'sometimes' ? 'Sometimes' : '';
    return `<div class="recog-tile${cls}" id="rt-${r.id}">
      <div class="recog-top" onclick="cycleRecog('${r.id}')" role="button" tabindex="0" style="cursor:pointer">
        <div class="recog-dot"><div class="recog-dot-in"></div></div>
        <div class="recog-text">${r.text}</div>
        ${state ? `<div class="recog-lbl">${lbl}</div>` : ''}
      </div>
    </div>`;
  }

  return `
    <div class="s-eyebrow">${isMe ? 'Your experience' : 'Your environment'}</div>
    <div class="s-head">${isMe ? 'Things you might recognise about yourself at work' : 'Things you might recognise about how work is set up around you'}</div>
    <div class="s-warm">${isMe ? 'These are about your own experience — not anyone else\'s behaviour.' : 'These are about the conditions, structure and setup around your work.'}</div>
    <div class="s-sub">${isMe
      ? 'Tap once if something sounds familiar. Tap again for "sometimes." Tap a third time to clear. Once you\'ve selected something, you\'ll see an option to choose whether it goes into a shared summary or stays just for you.'
      : 'Same as before — tap to select, choose whether to share or keep private.'}</div>
    <div class="recog-legend">
      <div class="rl"><div class="rl-dot" style="background:var(--purple)"></div>Yes, this is me</div>
      <div class="rl"><div class="rl-dot" style="background:var(--amber)"></div>Sometimes</div>
      <div class="rl"><div class="rl-dot" style="background:#DDD3E8"></div>Not selected</div>
    </div>
    <div class="recog-list">${items.map(tileHtml).join('')}</div>
    ${selCount > 0 ? `<div class="note note-green" style="margin-top:.5rem">You\'ve identified ${selCount} thing${selCount!==1?'s':''} so far — the next steps help you get more specific about each one.</div>` : ''}
    <div class="nav">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <button class="btn-next" onclick="goNext()" ${isMe&&selCount===0&&ITEMS.filter(r=>r.group==='env'&&(recognised[r.id]==='yes'||recognised[r.id]==='sometimes')).length===0?'':''}>${isMe ? 'Next →' : getRecognised().length===0?'Skip to summary →':'Explore these →'}</button>
    </div>
    <div class="spacer"></div>`;
}

function renderDrill() {
  const item = drillQueue[drillIdx];
  if (!item) { goNext(); return ''; }
  const l1sel = drillL1[item.id];
  const l1done = l1sel.size > 0;
  const canNext = l1done;
  const isLast  = drillIdx >= drillQueue.length - 1;
  const stateLabel = recognised[item.id]==='yes'?'You said: yes, this is me':'You said: sometimes';

  let html = `
    <div class="s-eyebrow">Getting specific — ${drillIdx+1} of ${drillQueue.length}</div>
    <div class="s-head">Let\'s explore this a bit more</div>
    <div class="s-warm">The more specific this gets, the more useful it\'ll be — whether you keep it private or use it to start a conversation.</div>
    <div class="drill-prog">
      <div class="drill-pips">
        ${drillQueue.map((_,i)=>`<div class="dpip${i<drillIdx?' done':i===drillIdx?' active':''}"></div>`).join('')}
      </div>
      <div class="drill-prog-txt">${drillIdx+1} of ${drillQueue.length}</div>
    </div>
    <div class="drill-card" id="l1-card-${item.id}">
      <div class="drill-ctx"><strong>${stateLabel}:</strong> "${item.text}"</div>
      <div class="drill-q">${item.drillL1.q}</div>
      <div class="drill-hint">${item.drillL1.hint}</div>
      <div class="drill-opts">
        ${item.drillL1.opts.map(o=>`
          <div class="drill-opt${l1sel.has(o.id)?' sel':''}"
            data-l1="${item.id}-${o.id}"
            onclick="toggleL1('${item.id}','${o.id}')"
            role="button" tabindex="0">
            <div class="dopt-dot"><div class="dopt-in"></div></div>
            <div class="dopt-txt">${o.text}</div>
          </div>`).join('')}
      </div>
    </div>`;

  // Level 2 blocks are injected dynamically by updateL2Block when L1 options are toggled
  // On initial render, rebuild any L2 blocks for already-selected L1 options
  // (handles back-navigation correctly)
  if (l1done) {
    [...l1sel].forEach(optId => {
      const l2def = item.drillL2[optId];
      if (!l2def) return;
      if (!drillL2[item.id][optId]) drillL2[item.id][optId] = new Set();
      const l2sel = drillL2[item.id][optId];
      const l1opt = item.drillL1.opts.find(o=>o.id===optId);
      html += `<div class="drill-card" id="l2-block-${item.id}-${optId}">
        <div class="drill-ctx">You selected: <strong>${l1opt.text}</strong></div>
        <div class="drill-q">${l2def.q}</div>
        <div class="drill-hint">Pick as many as feel true.</div>
        <div class="drill-opts">
          ${l2def.opts.map(o=>`
            <div class="drill-opt${l2sel.has(o.id)?' sel':''}"
              data-l2="${item.id}-${optId}-${o.id}"
              onclick="toggleL2('${item.id}','${optId}','${o.id}')"
              role="button" tabindex="0">
              <div class="dopt-dot"><div class="dopt-in"></div></div>
              <div class="dopt-txt">${o.text}</div>
            </div>`).join('')}
        </div>
      </div>`;
    });
  }

  // Free text
  html += `<div class="free-text-wrap">
    <div class="free-text-label">Anything else that would help capture this — in your own words?</div>
    <textarea class="free-text" rows="3" placeholder="Optional — add anything the options above didn\'t quite cover..."
      oninput="drillFree['${item.id}']=this.value">${drillFree[item.id]||''}</textarea>
  </div>`;

  html += `<div class="nav">
    <button class="btn-back" onclick="goBack()">← Back</button>
    <button class="btn-next" onclick="goNext()" ${canNext?'':'disabled'}>${isLast?'What\'s been tried →':'Next →'}</button>
  </div><div class="spacer"></div>`;
  return html;
}

function renderTried() {
  const items = getRecognised();
  if (!items.length) { goNext(); return ''; }

  let html = `
    <div class="s-eyebrow">One quick thing</div>
    <div class="s-head">Has anything already helped?</div>
    <div class="s-warm">If you\'ve already tried something — even if it only helped a little — it\'s worth knowing.</div>
    <div class="s-sub">This is optional. If nothing comes to mind, just move on. There are no right answers here.</div>`;

  items.forEach(item => {
    html += `<div style="padding:0 1.25rem .25rem">
      <div style="font-size:10px;font-weight:600;color:var(--purple);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px">${item.text.slice(0,52)}${item.text.length>52?'...':''}</div>
    </div>
    <div class="free-text-wrap">
      <textarea class="free-text" rows="2"
        placeholder="Anything you\'ve tried — or anything that\'s helped even a little... (optional)"
        oninput="triedFree[\'${item.id}\']=this.value">${triedFree[item.id]||''}</textarea>
    </div>`;
  });

  html += `<div class="nav">
    <button class="btn-back" onclick="goBack()">← Back</button>
    <button class="btn-next" onclick="goNext()">What might help →</button>
  </div><div class="spacer"></div>`;
  return html;
}

function renderSuggestions() {
  const items = getRecognised();
  let html = `
    <div class="s-eyebrow">What might help</div>
    <div class="s-head">Some things worth exploring</div>
    <div class="s-warm">These are starting points — conversation starters, not guarantees.</div>
    <div class="s-sub">Select the ones that feel relevant. They\'ll come through in your summary. You can always add your own thoughts in the free text field at the end.</div>
    <div class="note note-warm">What\'s possible will vary depending on your role and organisation. These are things worth raising — not demands. Your employer\'s usual processes will shape what can be agreed.</div>`;

  items.forEach(item => {
    if (!selectedSugs[item.id]) selectedSugs[item.id] = {};
    const triedNote = triedFree[item.id]?.trim();
    html += `<div style="padding:.5rem 1.25rem .25rem">
      <div style="font-size:10px;font-weight:600;color:var(--purple);letter-spacing:.08em;text-transform:uppercase">${item.text.slice(0,52)}${item.text.length>52?'...':''}</div>
    </div>`;
    if (triedNote) {
      html += `<div class="note note-green" style="margin-bottom:4px">Already tried: ${triedNote}</div>`;
    }
    html += `<div class="sug-grid">`;
    item.suggestions.forEach((s,si) => {
      const isSel = selectedSugs[item.id][si];
      html += `<div class="sug-item${isSel?' sel':''}" onclick="toggleSug('${item.id}',${si})">
        <div class="sug-dot"><div class="sug-dot-in"></div></div>
        <div class="sug-text">${s.text}</div>
      </div>`;
    });
    html += `</div>`;
  });

  html += `<div class="nav">
    <button class="btn-back" onclick="goBack()">← Back</button>
    <button class="btn-next" onclick="goNext()">Build my summary →</button>
  </div><div class="spacer"></div>`;
  return html;
}

    <div class="s-eyebrow">Almost there</div>
    <div class="s-head">What would you like to do with this?</div>
    <div class="s-warm">You've done the hard part. Now you choose what happens next.</div>
    <div class="s-sub">There's no right answer. Sometimes just having it written down for yourself is enough.</div>
    <div class="share-options">
      <div class="share-opt${shareDecision==='private'?' sel':''}" onclick="setShareDecision('private')">
        <div class="share-opt-icon">🔒</div>

          <div class="share-opt-title">Keep it private for now</div>
          <div class="share-opt-desc">Download a summary just for yourself. You can decide what to do with it later — there's no rush.</div>
        </div>
      </div>

      <div class="share-opt${shareDecision==='hr'?' sel':''}" onclick="setShareDecision('hr')">
        <div class="share-opt-icon">🏢</div>

          <div class="share-opt-title">Bring this to HR or a people team</div>

      </div>

          <div class="share-opt-title">Use this to prepare for Occupational Health or Access to Work</div>

        </div>
      </div>
      <div class="share-opt${shareDecision==='unsure'?' sel':''}" onclick="setShareDecision('unsure')">
        <div class="share-opt-icon">💭</div>

          <div class="share-opt-title">Not sure yet</div>
          <div class="share-opt-desc">Download privately and sit with it. You don't have to decide now.</div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <button class="btn-next" onclick="goNext()" ${shareDecision?'':'disabled'}>Build my summary →</button>
    </div>
    <div class="spacer"></div>`;

function renderSummary() {
  const shared  = getShared();
  const priv    = getPrivate();
  const allSugs = [];
  getRecognised().forEach(item => {
    item.suggestions.forEach((s,si) => {
      if (selectedSugs[item.id]?.[si]) allSugs.push(s.text);
    });
  });
  const helping = [];
  getRecognised().forEach(item => {
    if (triedFree[item.id]?.trim()) helping.push(triedFree[item.id].trim());
  });

  /* Build a synthesised opening paragraph */
  let openPara = `${wbLabel(wellbeing)}`;
  if (shared.length) {
    openPara += ` There are ${shared.length} area${shared.length!==1?'s':''} worth exploring in more detail below.`;
  }
  if (helping.length) {
    openPara += ` Some things are already helping.`;
  }
  if (allSugs.length) {
    openPara += ` There are also some things that might be worth trying.`;
  }

  let html = `
    <div class="s-eyebrow" style="padding-top:1.25rem">Your summary</div>
    <div class="s-sub">Here\'s what you\'ve identified. Download it for yourself, or use it to start a conversation.</div>
    <div class="summary-card">
      <div class="sum-hdr">
        <div class="sum-hdr-title">Work Explorer</div>
        <div class="sum-hdr-sub">${
          shareDecision==='manager'?'For a conversation with my manager':
          shareDecision==='hr'?'For a conversation with HR':
          shareDecision==='oh'?'To prepare for Occupational Health or Access to Work':
          'Private — for my own reflection'
        }</div>
        <div class="sum-hdr-bih">Brain in Hand · ${new Date().toLocaleDateString('en-GB')}</div>
      </div>
      <div class="sum-body">
        <div>
          <div class="sum-st">In a nutshell</div>
          <div class="sum-para">${openPara}</div>
        </div>`;

  if (shared.length) {
    html += `<div><div class="sum-st">Where things are harder — in more detail</div>`;
    shared.forEach(item => {
      const l1s = [...(drillL1[item.id]||new Set())].map(id=>item.drillL1.opts.find(o=>o.id===id)?.text).filter(Boolean);
      const l2texts = [];
      Object.entries(drillL2[item.id]||{}).forEach(([optId, l2set])=>{
        const l2def = item.drillL2[optId];
        if (!l2def) return;
        [...l2set].forEach(l2id=>{
          const opt = l2def.opts.find(o=>o.id===l2id);
          if (opt) l2texts.push(opt.text);
        });
      });
      const free = drillFree[item.id]?.trim();
      html += `<div class="sum-drill">
        <div class="sum-drill-text">${item.text}</div>
        ${l1s.map(t=>`<div class="sum-drill-l1">\u2192 ${t}</div>`).join('')}
        ${l2texts.map(t=>`<div class="sum-drill-l2">\u2192 ${t}</div>`).join('')}
        ${free?`<div class="sum-drill-l2">\u2192 ${free}</div>`:''}
      </div>`;
    });
    html += `</div>`;
  }

  if (helping.length) {
    html += `<div><div class="sum-st">What\'s already helping</div>`;
    helping.forEach(t=>{ html+=`<div class="sum-item green-i">${t}</div>`; });
    html += `</div>`;
  }

  if (allSugs.length) {
    html += `<div><div class="sum-st">Things worth exploring</div>`;
    allSugs.forEach(s=>{ html+=`<div class="sum-item amber-i">${s}</div>`; });
    html += `</div>`;
  }

  if (priv.length) {
    html += `<div><div class="sum-st" style="color:var(--priv)">Private notes — just for you</div>`;
    priv.forEach(item=>{
      const l1s = [...(drillL1[item.id]||new Set())].map(id=>item.drillL1.opts.find(o=>o.id===id)?.text).filter(Boolean);
      html += `<div class="sum-item priv-i">
        <div style="font-weight:500">${item.text}</div>
        ${l1s.map(t=>`<div style="font-size:11px;color:var(--priv);margin-top:2px">\u2192 ${t}</div>`).join('')}
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="sum-caveat">This summary reflects your own experience and is a starting point for a conversation — not a formal document. It sits alongside, rather than replacing, any processes your organisation has in place for workplace support.</div>
      </div>
    </div>
    <button class="btn-action" onclick="downloadPDF()">⬇ Download my summary</button>
    <button class="btn-restart" onclick="restart()">Start again</button>
    <div class="spacer"></div>`;
  return html;
}

/* ── PDF ────────────────────────────────────────────────────────── */
async function downloadPDF() {
  const ov = document.createElement('div');
  ov.className='pdf-loading';
  ov.innerHTML=`<div class="pdf-spinner"></div><div class="pdf-loading-text">Building your summary\u2026</div>`;
  document.body.appendChild(ov);
  await new Promise(r=>setTimeout(r,50));
  try {
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,M=18,col=W-M*2; let y=0;
    const PLUM=[27,0,46],PURPLE=[142,60,206],LILAC=[234,193,255],PALE=[245,234,249];
    const YELLOW=[255,229,92],MUTED=[107,90,126];
    const GREEN=[46,125,82],GBG=[232,245,238];
    const AMBER=[255,201,98],ABG=[255,248,225];
    const PRIV=[74,111,165],PBG=[238,243,251],PBD=[184,207,238];

    function ap(){doc.addPage();y=M;}
    function chk(n){if(y+n>282)ap();}
    function fr(x,ry,w,h,c,r=2){doc.setFillColor(...c);doc.roundedRect(x,ry,w,h,r,r,'F');}
    function sr(x,ry,w,h,c,lw=0.3,r=2){doc.setDrawColor(...c);doc.setLineWidth(lw);doc.roundedRect(x,ry,w,h,r,r,'D');}

    function sh(lbl,sy){
      chk(14);
      doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(...PURPLE);
      doc.text(lbl.toUpperCase(),M,sy);
      doc.setDrawColor(...LILAC);doc.setLineWidth(0.3);
      doc.line(M,sy+1.5,W-M,sy+1.5);
      return sy+7;
    }
    function si(txt,sy,ac=PURPLE,bg=PALE){
      chk(16);
      const lines=doc.splitTextToSize(clean(txt),col-14);
      const h=Math.max(12,lines.length*5+6);
      fr(M,sy,col,h,bg);
      doc.setFillColor(...ac);doc.rect(M,sy,2.5,h,'F');
      doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(...PLUM);
      doc.text(lines,M+6,sy+5.5);
      return sy+h+3;
    }
    function di(item,sy){
      chk(22);
      const l1s=[...(drillL1[item.id]||new Set())].map(id=>item.drillL1.opts.find(o=>o.id===id)?.text).filter(Boolean);
      const l2ts=[];
      Object.entries(drillL2[item.id]||{}).forEach(([oid,l2set])=>{
        const l2d=item.drillL2[oid];if(!l2d)return;
        [...l2set].forEach(lid=>{const o=l2d.opts.find(x=>x.id===lid);if(o)l2ts.push(o.text);});
      });
      const free=drillFree[item.id]?.trim();
      const titleLines=doc.splitTextToSize(clean(item.text),col-10);
      let h=titleLines.length*5+6;
      h+=l1s.length*6;h+=l2ts.length*6;if(free)h+=6;h=Math.max(h,14);
      fr(M,sy,col,h,PALE);sr(M,sy,col,h,LILAC);
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...PLUM);
      doc.text(titleLines,M+4,sy+5.5);
      let dy=sy+titleLines.length*5+4;
      l1s.forEach(t=>{
        doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...PURPLE);
        const ll=doc.splitTextToSize('\u2192 '+clean(t),col-10);
        doc.text(ll,M+6,dy);dy+=ll.length*5+1;
      });
      l2ts.forEach(t=>{
        doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...MUTED);
        const ll=doc.splitTextToSize('\u2192 '+clean(t),col-12);
        doc.text(ll,M+8,dy);dy+=ll.length*5+1;
      });
      if(free){
        doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(...MUTED);
        const ll=doc.splitTextToSize('\u2192 '+clean(free),col-12);
        doc.text(ll,M+8,dy);
      }
      return sy+h+3;
    }

    /* Header */
    fr(0,0,W,38,PLUM,0);
    doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('Work Explorer',M,16);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(...LILAC);
    const shared=getShared();
    doc.text(shared.length?'Includes items prepared for sharing':'Private \u2014 for your own reflection',M,24);
    doc.setFontSize(7.5);doc.setTextColor(...YELLOW);
    doc.text('Brain in Hand  |  '+new Date().toLocaleDateString('en-GB'),M,31);
    y=46;

    /* Wellbeing */
    y=sh('In a nutshell',y);
    y=si(wbLabel(wellbeing),y);y+=2;

    /* Shared */
    if(shared.length){
      y=sh('Where things are harder',y);
      shared.forEach(item=>{y=di(item,y);});
      y+=2;
    }

    /* Helping */
    const helping=[];
    getRecognised().forEach(item=>{
      if(triedFree[item.id]?.trim())helping.push(triedFree[item.id].trim());
    });
    if(helping.length){y=sh('What\'s already helping',y);helping.forEach(t=>{y=si(t,y,GREEN,GBG);});y+=2;}

    /* Suggestions */
    const sugs=[];
    getRecognised().forEach(item=>{
      item.suggestions.forEach((s,si2)=>{if(selectedSugs[item.id]?.[si2])sugs.push(s.text);});
    });
    if(sugs.length){y=sh('Things worth exploring',y);sugs.forEach(s=>{y=si(s,y,AMBER,ABG);});y+=2;}

    /* Private — page 2 */
    const priv=getPrivate();
    if(priv.length){
      ap();
      fr(0,0,W,32,PLUM,0);
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text('Your private notes',W/2,14,{align:'center'});
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...LILAC);
      doc.text('Just for you \u2014 please don\'t share this page',W/2,22,{align:'center'});
      y=40;
      fr(M,y,col,14,PBG,2);sr(M,y,col,14,PBD);
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...PRIV);
      const pn=doc.splitTextToSize('These are the things you noted for yourself and chose not to include in a shared summary. They\'re here so you have a record. You can use them to start a conversation when you\'re ready, or simply keep them for yourself.',col-8);
      doc.text(pn,M+4,y+5);
      y+=18;
      y=sh('Things I noted for myself',y);
      priv.forEach(item=>{y=di(item,y);});
    }

    /* Caveat */
    chk(20);y+=3;
    fr(M,y,col,16,PALE,2);sr(M,y,col,16,LILAC);
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(...MUTED);
    const cav=doc.splitTextToSize('This summary reflects personal experience and is a starting point for a conversation, not a formal document. It sits alongside rather than replacing Access to Work, Occupational Health, or any other process your organisation has in place.',col-8);
    doc.text(cav,M+4,y+5);

    /* Footer */
    const pages=doc.getNumberOfPages();
    for(let i=1;i<=pages;i++){
      doc.setPage(i);
      doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(...MUTED);
      doc.text('Brain in Hand \u2014 Work Explorer \u2014 '+new Date().toLocaleDateString('en-GB'),M,291);
      doc.text('Page '+i+' of '+pages,W-M,291,{align:'right'});
    }
    doc.save('work-explorer.pdf');
  } catch(err) {
    console.error(err);
    alert('Sorry \u2014 something went wrong. Please try again.');
  }
  document.body.removeChild(ov);
}

/* ── Handlers ────────────────────────────────────────────────────── */
function toggleJD(){jdLoaded=!jdLoaded;render();}
function reRenderCheckin(){document.getElementById('app').innerHTML=renderCheckin();}

function cycleRecog(id){
  const cur=recognised[id];
  recognised[id]=cur===null?'yes':cur==='yes'?'sometimes':null;
  if(recognised[id]===null)shareChoice[id]=null;
  render();
}


function toggleL1(id,optId){
  const s=drillL1[id];
  s.has(optId)?s.delete(optId):s.add(optId);
  // Update only the clicked button in place
  const btn=document.querySelector('[data-l1="'+id+'-'+optId+'"]');
  if(btn) btn.classList.toggle('sel',s.has(optId));
  // Enable/disable the Next button based on whether anything is selected
  const nextBtn=document.querySelector('.btn-next');
  if(nextBtn) nextBtn.disabled = s.size === 0;
  // Show/hide L2 follow-up for this option without full re-render
  updateL2Block(id,optId,s.has(optId));
}
function updateL2Block(id,optId,show){
  const item=ITEMS.find(r=>r.id===id);
  if(!item||!item.drillL2[optId])return;
  const blockId='l2-block-'+id+'-'+optId;
  let block=document.getElementById(blockId);
  if(show&&!block){
    // Create and insert L2 block after all L1 options
    if(!drillL2[id][optId])drillL2[id][optId]=new Set();
    const l2sel=drillL2[id][optId];
    const l2def=item.drillL2[optId];
    const l1opt=item.drillL1.opts.find(o=>o.id===optId);
    const div=document.createElement('div');
    div.id=blockId;
    div.className='drill-card';
    div.style.marginTop='0';
    div.innerHTML=`<div class="drill-ctx">You selected: <strong>${l1opt.text}</strong></div>
      <div class="drill-q">${l2def.q}</div>
      <div class="drill-hint">Pick as many as feel true.</div>
      <div class="drill-opts">
        ${l2def.opts.map(o=>`<div class="drill-opt${l2sel.has(o.id)?' sel':''}"
          data-l2="${id}-${optId}-${o.id}"
          onclick="toggleL2('${id}','${optId}','${o.id}')"
          role="button" tabindex="0">
          <div class="dopt-dot"><div class="dopt-in"></div></div>
          <div class="dopt-txt">${o.text}</div>
        </div>`).join('')}
      </div>`;
    // Insert after the L1 card
    const l1card=document.getElementById('l1-card-'+id);
    if(l1card&&l1card.parentNode){
      // Insert after existing L2 blocks or after L1 card
      let insertAfter=l1card;
      let next=l1card.nextSibling;
      while(next&&next.id&&next.id.startsWith('l2-block-')){
        insertAfter=next;next=next.nextSibling;
      }
      insertAfter.parentNode.insertBefore(div,insertAfter.nextSibling);
    }
  } else if(!show&&block){
    block.remove();
  }
}
function toggleL2(id,l1id,optId){
  if(!drillL2[id][l1id])drillL2[id][l1id]=new Set();
  const s=drillL2[id][l1id];
  s.has(optId)?s.delete(optId):s.add(optId);
  const btn=document.querySelector('[data-l2="'+id+'-'+l1id+'-'+optId+'"]');
  if(btn) btn.classList.toggle('sel',s.has(optId));
}
function setTried(itemId,tId,rating){
  if(!triedRatings[itemId])triedRatings[itemId]={};
  triedRatings[itemId][tId]=triedRatings[itemId][tId]===rating?null:rating;
  // Re-render only the rating buttons for this tried item, not the whole page
  const ratingRow = document.querySelector('[data-tried-item="'+itemId+'-'+tId+'"]');
  if(ratingRow){
    const r=triedRatings[itemId][tId];
    ratingRow.querySelectorAll('.trat').forEach(btn=>{
      const rtype=btn.getAttribute('data-rating');
      btn.className='trat'+(r===rtype?' '+rtype:'');
    });
  }
}
function setShareDecision(choice){
  shareDecision=choice;
  document.querySelectorAll('.share-opt').forEach(el=>el.classList.remove('sel'));
  const opts=['private','manager','hr','oh','unsure'];
  const idx=opts.indexOf(choice);
  const all=document.querySelectorAll('.share-opt');
  if(all[idx])all[idx].classList.add('sel');
  const btn=document.querySelector('.btn-next');
  if(btn)btn.disabled=false;
}

function toggleSug(itemId,si){
  if(!selectedSugs[itemId])selectedSugs[itemId]={};
  selectedSugs[itemId][si]=!selectedSugs[itemId][si];
  render();
}

/* ── Main render ────────────────────────────────────────────────── */
function render(){
  renderPips();
  window.scrollTo(0,0);
  const app=document.getElementById('app');
  switch(STAGES[stage]){
    case 'welcome':     app.innerHTML=renderWelcome();      break;
    case 'checkin':     app.innerHTML=renderCheckin();      break;
    case 'recog-me':    app.innerHTML=renderRecogGroup('me');  break;
    case 'recog-env':   app.innerHTML=renderRecogGroup('env'); break;
    case 'drill':       app.innerHTML=renderDrill();        break;
    case 'tried':       app.innerHTML=renderTried();        break;
    case 'suggestions': app.innerHTML=renderSuggestions();  break;
    case 'share':       app.innerHTML=renderShare();        break;
    case 'summary':     app.innerHTML=renderSummary();      break;
  }
}

function restart(){
  stage=0;wellbeing=50;jdLoaded=false;
  ITEMS.forEach(r=>{
    recognised[r.id]=null;shareChoice[r.id]=null;
    drillL1[r.id]=new Set();drillL2[r.id]={};
    drillFree[r.id]='';triedRatings[r.id]={};
    triedFree[r.id]='';selectedSugs[r.id]={};
  });
  drillQueue=[];drillIdx=0;shareDecision=null;
  render();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' '){
    const t=e.target;
    if(['drill-opt','sug-item'].some(c=>t.classList.contains(c))){e.preventDefault();t.click();}
  }
});

render();

/* ── Text to Speech ─────────────────────────────────────────────── */
let ttsActive = false;
let ttsUtterance = null;
let ttsPaused = false;

function getTTSText() {
  // Extract readable text from the current screen
  const app = document.getElementById('app');
  if (!app) return '';

  const parts = [];

  // Eyebrow / label
  const eyebrow = app.querySelector('.s-eyebrow');
  if (eyebrow) parts.push(eyebrow.textContent.trim());

  // Main heading
  const head = app.querySelector('.s-head');
  if (head) parts.push(head.textContent.trim());

  // Warm subtitle
  const warm = app.querySelector('.s-warm');
  if (warm) parts.push(warm.textContent.trim());

  // Sub text
  const sub = app.querySelector('.s-sub');
  if (sub) parts.push(sub.textContent.trim());

  // Card paragraphs (welcome screen)
  app.querySelectorAll('.card p').forEach(p => {
    parts.push(p.textContent.trim());
  });

  // Note boxes
  app.querySelectorAll('.note').forEach(n => {
    parts.push(n.textContent.trim());
  });

  // Group intro
  const groupIntro = app.querySelector('.group-intro-body');
  if (groupIntro) parts.push(groupIntro.textContent.trim());

  // Recognition tiles — read each statement
  app.querySelectorAll('.recog-text').forEach(t => {
    parts.push(t.textContent.trim());
  });

  // Drill context
  const drillCtx = app.querySelector('.drill-ctx');
  if (drillCtx) parts.push(drillCtx.textContent.trim());

  // Drill question
  const drillQ = app.querySelector('.drill-q');
  if (drillQ) parts.push(drillQ.textContent.trim());

  // Drill hint
  const drillHint = app.querySelector('.drill-hint');
  if (drillHint) parts.push(drillHint.textContent.trim());

  // Drill options
  app.querySelectorAll('.dopt-txt').forEach((opt, i) => {
    parts.push('Option ' + (i + 1) + ': ' + opt.textContent.trim());
  });

  // Suggestion items
  app.querySelectorAll('.sug-text').forEach(s => {
    parts.push(s.textContent.trim());
  });

  // Summary paragraphs
  app.querySelectorAll('.sum-para,.sum-item,.sum-drill-text,.sum-drill-l1,.sum-drill-l2').forEach(el => {
    const t = el.textContent.trim();
    if (t) parts.push(t);
  });

  return parts.filter(Boolean).join('. ');
}

function toggleTTS() {
  if (ttsActive) {
    stopTTS();
  } else {
    startTTS();
  }
}

function startTTS() {
  if (!window.speechSynthesis) {
    alert('Read aloud isn\'t supported in this browser. Try Chrome or Safari.');
    return;
  }

  stopTTS(); // clear any existing

  const text = getTTSText();
  if (!text) return;

  ttsUtterance = new SpeechSynthesisUtterance(text);
  ttsUtterance.rate  = 0.88;  // slightly slower than default
  ttsUtterance.pitch = 1;
  ttsUtterance.lang  = 'en-GB';

  // Try to find a natural English voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.lang.startsWith('en') && (v.name.includes('Natural') || v.name.includes('Daniel') ||
    v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Moira'))
  ) || voices.find(v => v.lang.startsWith('en-GB'))
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) ttsUtterance.voice = preferred;

  ttsUtterance.onstart = () => {
    ttsActive = true;
    document.querySelector('.shell').classList.add('tts-reading');
    const bar = document.getElementById('tts-bar');
    if (bar) bar.classList.remove('hidden');
    updateTTSBar('Reading aloud — tap the speaker to stop');
  };

  ttsUtterance.onend = ttsUtterance.onerror = () => {
    ttsActive = false;
    document.querySelector('.shell').classList.remove('tts-reading');
    const bar = document.getElementById('tts-bar');
    if (bar) bar.classList.add('hidden');
  };

  window.speechSynthesis.speak(ttsUtterance);
}

function stopTTS() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  ttsActive = false;
  document.querySelector('.shell').classList.remove('tts-reading');
  const bar = document.getElementById('tts-bar');
  if (bar) bar.classList.add('hidden');
}

function updateTTSBar(text) {
  const el = document.getElementById('tts-bar-text');
  if (el) el.textContent = text;
}

// Stop reading when page changes
const _origRender = render;
window.render = function() {
  stopTTS();
  _origRender();
};

// Voices may load async on some browsers
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
}
</script>
