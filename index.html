<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work With Me — Brain in Hand</title>
<meta name="description" content="Build a working preferences profile that helps colleagues understand how to work well with you.">
<style>
/* ── Reset & tokens ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --plum:   #1B002E;
  --purple: #8E3CCE;
  --lilac:  #EAC1FF;
  --pale:   #F5EAF9;
  --amber:  #FFC962;
  --yellow: #FFE95C;
  --bg:     #FAF9F5;
  --muted:  #6B5A7E;
  --drain:  #E05555;
  --priv:   #4A6FA5;
  --priv-bg:#EEF3FB;
  --priv-bd:#B8CFEE;
  --radius: 10px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
}
body {
  font-family: var(--font);
  background: var(--bg);
  min-height: 100vh;
  color: var(--plum);
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor: pointer; }
input  { font-family: var(--font); }

/* ── Layout shell ───────────────────────────────────────── */
.shell {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ── Header ─────────────────────────────────────────────── */
.hdr {
  background: var(--plum);
  padding: 1.25rem 1.25rem 0.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  color: var(--yellow);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.logo span {
  color: rgba(255,255,255,.45);
  font-weight: 400;
  letter-spacing: 0;
  text-transform: none;
  margin-left: 6px;
}
.step-counter {
  font-size: 11px;
  color: rgba(255,255,255,.4);
}

/* ── Progress pips ──────────────────────────────────────── */
.pips {
  background: var(--plum);
  padding: 0 1.25rem 1rem;
  display: flex;
  gap: 5px;
}
.pip {
  height: 3px;
  border-radius: 2px;
  flex: 1;
  background: rgba(255,255,255,.15);
  transition: background .3s;
}
.pip.done   { background: var(--yellow); }
.pip.active { background: var(--lilac); }

/* ── Section labels ─────────────────────────────────────── */
.s-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--purple);
  padding: 1.25rem 1.25rem .35rem;
}
.s-head {
  font-size: 19px;
  font-weight: 500;
  color: var(--plum);
  padding: 0 1.25rem .25rem;
  line-height: 1.35;
}
.s-sub {
  font-size: 12px;
  color: var(--muted);
  padding: 0 1.25rem 1rem;
  line-height: 1.6;
}

/* ── Info card (intro / battery notice) ─────────────────── */
.info-card {
  margin: 0 1.25rem 1rem;
  background: #fff;
  border-radius: 12px;
  border: .5px solid var(--lilac);
  padding: 1rem 1.1rem;
}
.info-card p {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: .65rem;
}
.info-card p:last-child { margin-bottom: 0; }
.info-card strong { color: var(--plum); font-weight: 500; }
.info-card .small  { font-size: 11px; color: #9B8AAA; }

/* ── Visibility legend ──────────────────────────────────── */
.vis-key {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 1.25rem .75rem;
}
.vk-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--muted);
}
.vk-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Tile grid ──────────────────────────────────────────── */
.tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(136px, 1fr));
  gap: 7px;
  padding: 0 1.25rem .5rem;
}
.tile {
  background: #fff;
  border: 1.5px solid #EDE0F5;
  border-radius: var(--radius);
  padding: 9px 9px 8px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-height: 66px;
  -webkit-tap-highlight-color: transparent;
}
.tile:hover { border-color: var(--lilac); }
.tile.vs-public  { border-color: var(--purple); background: var(--pale); }
.tile.vs-private { border-color: var(--priv-bd); background: var(--priv-bg); }
.tile.vs-skip    { border-color: #DDD3E8; background: #F7F3FB; opacity: .7; }
.tile.drain-tile { border-color: #FAD7D7; }
.tile.drain-tile.vs-public  { border-color: var(--drain); background: #FFF5F5; }
.tile.drain-tile.vs-private { border-color: var(--priv-bd); background: var(--priv-bg); }

.tile-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 4px;
  width: 100%;
}
.tile-emoji { font-size: 17px; line-height: 1; flex-shrink: 0; }
.tile-badge {
  font-size: 9px;
  font-weight: 500;
  padding: 2px 5px;
  border-radius: 4px;
  white-space: nowrap;
  line-height: 1.3;
  flex-shrink: 0;
}
.vs-public  .tile-badge { background: var(--pale); color: var(--purple); border: .5px solid var(--lilac); }
.vs-private .tile-badge { background: var(--priv-bg); color: var(--priv); border: .5px solid var(--priv-bd); }
.vs-skip    .tile-badge { background: #EEE8F5; color: #9B8AAA; border: .5px solid #DDD3E8; }
.tile-label {
  font-size: 11px;
  color: var(--plum);
  line-height: 1.35;
}
.tile-hint {
  font-size: 9px;
  color: var(--muted);
  line-height: 1.3;
}
.vs-public  .tile-hint { color: var(--purple); }
.vs-private .tile-hint { color: var(--priv); }
.vs-skip    .tile-hint { color: #9B8AAA; }

/* ── Drain note ─────────────────────────────────────────── */
.drain-note {
  margin: 0 1.25rem .5rem;
  background: #FFF5F5;
  border: .5px solid #FFCDD2;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 11px;
  color: #8B2020;
  line-height: 1.55;
}

/* ── Nav row ────────────────────────────────────────────── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem 1.5rem;
  margin-top: auto;
}
.btn-back {
  font-size: 12px;
  color: var(--muted);
  background: none;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 3px;
}
.btn-next {
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  background: var(--purple);
  border: none;
  border-radius: 8px;
  padding: 10px 24px;
  transition: opacity .15s;
}
.btn-next:hover   { opacity: .88; }
.btn-next:disabled { opacity: .35; cursor: not-allowed; }

/* ── Avatar row ─────────────────────────────────────────── */
.av-row {
  display: flex;
  align-items: center;
  gap: .9rem;
  padding: 0 1.25rem 1rem;
  position: relative;
}
.av-circle {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  background: var(--lilac);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  border: 2px solid var(--purple);
  flex-shrink: 0;
  cursor: pointer;
  transition: transform .15s;
  position: relative;
}
.av-circle:hover { transform: scale(1.05); }
.av-picker {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: .6rem;
  background: #fff;
  border: .5px solid var(--lilac);
  border-radius: 12px;
  position: absolute;
  top: 76px;
  left: 0;
  z-index: 50;
  box-shadow: 0 4px 20px rgba(27,0,46,.12);
}
.av-picker button {
  font-size: 19px;
  width: 34px;
  height: 34px;
  border: none;
  background: none;
  border-radius: 7px;
  transition: background .12s;
}
.av-picker button:hover { background: var(--pale); }
.name-input {
  font-size: 15px;
  font-weight: 500;
  color: var(--plum);
  border: none;
  border-bottom: 1.5px solid var(--lilac);
  background: transparent;
  width: 100%;
  padding: 3px 0;
  outline: none;
}
.name-input:focus { border-bottom-color: var(--purple); }
.role-input {
  font-size: 12px;
  color: var(--muted);
  border: none;
  border-bottom: 1px solid var(--lilac);
  background: transparent;
  width: 100%;
  padding: 3px 0;
  margin-top: 5px;
  outline: none;
}
.role-input:focus { border-bottom-color: var(--purple); }

/* ── JD upload box ──────────────────────────────────────── */
.jd-box {
  margin: .25rem 1.25rem 0;
  border: 1.5px dashed var(--lilac);
  border-radius: var(--radius);
  padding: .85rem;
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 9px;
  transition: border-color .15s;
}
.jd-box:hover { border-color: var(--purple); }
.jd-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: var(--pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.jd-title { font-size: 12px; font-weight: 500; color: var(--plum); }
.jd-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
.jd-badge {
  font-size: 10px;
  background: var(--amber);
  color: var(--plum);
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 500;
  white-space: nowrap;
}

/* ── Battery section ────────────────────────────────────── */
.bat-wrap { padding: 0 1.25rem 1rem; }
.bat-label {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: .5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.bat-label strong { color: var(--plum); font-weight: 500; }
input[type=range] {
  width: 100%;
  margin-bottom: 8px;
  accent-color: var(--purple);
}
.bat-track {
  height: 22px;
  border-radius: 11px;
  background: #EDE0F5;
  overflow: hidden;
  border: .5px solid var(--lilac);
}
.bat-fill {
  height: 100%;
  border-radius: 11px;
  transition: width .25s, background .25s;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
}
.bat-fill span {
  font-size: 10px;
  font-weight: 500;
  color: #fff;
}
.bat-tip {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  text-align: center;
  font-style: italic;
}
.bat-notice {
  margin: 0 1.25rem .75rem;
  background: var(--priv-bg);
  border: .5px solid var(--priv-bd);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 11px;
  color: var(--priv);
  line-height: 1.55;
}
.sec-toggle {
  display: flex;
  gap: 6px;
  padding: 0 1.25rem .75rem;
}
.stog {
  flex: 1;
  padding: 8px 4px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid transparent;
  text-align: center;
  transition: all .15s;
}
.stog.charge { background: var(--pale); color: var(--purple); border-color: var(--lilac); }
.stog.charge.active { background: var(--purple); color: #fff; border-color: var(--purple); }
.stog.drain  { background: #FFF5F5; color: #8B2020; border-color: #FFCDD2; }
.stog.drain.active  { background: var(--drain); color: #fff; border-color: var(--drain); }

/* ── Time of day ────────────────────────────────────────── */
.tod-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 1.25rem .6rem;
}
.tod-legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--muted);
}
.tod-legend-dot {
  width: 9px;
  height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}
.tod-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 0 1.25rem .5rem;
}
.tod-cell {
  background: #fff;
  border: 1.5px solid #EDE0F5;
  border-radius: 9px;
  padding: 8px 6px;
  cursor: pointer;
  text-align: center;
  transition: border-color .15s, background .15s;
  -webkit-tap-highlight-color: transparent;
}
.tod-cell:hover { border-color: var(--lilac); }
.tod-cell.peak { border-color: var(--purple); background: var(--pale); }
.tod-cell.low  { border-color: var(--drain); background: #FFF5F5; }
.tod-time  { font-size: 9px; color: var(--muted); margin-bottom: 3px; }
.tod-bar-wrap {
  height: 28px;
  border-radius: 4px;
  background: #EDE0F5;
  overflow: hidden;
  position: relative;
  margin: 2px 0;
}
.tod-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  border-radius: 4px;
  transition: height .25s, background .25s;
}
.tod-name {
  font-size: 9px;
  font-weight: 500;
  margin-top: 2px;
}
.tod-notice {
  margin: .5rem 1.25rem 0;
  background: var(--pale);
  border: .5px solid var(--lilac);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 10px;
  color: var(--muted);
  line-height: 1.55;
}

/* ── Consent gate ───────────────────────────────────────── */
.consent-wrap { padding: 0 1.25rem; }
.consent-card {
  background: #fff;
  border-radius: 12px;
  border: 1.5px solid var(--purple);
  overflow: hidden;
}
.consent-hdr {
  background: var(--purple);
  padding: .9rem 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.consent-hdr-icon { font-size: 18px; }
.consent-hdr-txt  { font-size: 13px; font-weight: 500; color: #fff; }
.consent-body { padding: 1rem; }
.consent-body p {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: .65rem;
}
.consent-body p:last-of-type { margin-bottom: 0; }
.consent-body strong { color: var(--plum); font-weight: 500; }
.consent-check-wrap {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  margin-top: 1rem;
  padding: .8rem;
  background: var(--pale);
  border: .5px solid var(--lilac);
  border-radius: 8px;
  cursor: pointer;
}
.consent-check-wrap input { margin-top: 1px; accent-color: var(--purple); flex-shrink: 0; }
.consent-check-wrap label { font-size: 11px; color: var(--plum); line-height: 1.5; cursor: pointer; }
.consent-btns { display: flex; gap: 8px; margin-top: 1rem; }
.btn-publish {
  flex: 1;
  background: var(--purple);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  border: none;
  border-radius: 8px;
  padding: 12px;
  transition: opacity .15s;
}
.btn-publish:hover   { opacity: .88; }
.btn-publish:disabled { opacity: .35; cursor: not-allowed; }
.btn-go-back {
  flex: 1;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  border: .5px solid var(--lilac);
  border-radius: 8px;
  padding: 12px;
}

/* ── Profile card ───────────────────────────────────────── */
.profile-card {
  margin: .75rem 1.25rem 0;
  background: #fff;
  border-radius: 14px;
  border: .5px solid var(--lilac);
  overflow: hidden;
}
.profile-hdr {
  background: var(--plum);
  padding: 1.1rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.profile-av {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--lilac);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border: 2px solid rgba(255,255,255,.25);
  flex-shrink: 0;
}
.profile-name { font-size: 15px; font-weight: 500; color: #fff; }
.profile-role { font-size: 11px; color: var(--lilac); margin-top: 2px; }
.profile-bih  { font-size: 10px; color: var(--yellow); margin-top: 5px; opacity: .75; }
.profile-body { padding: 1.1rem; display: flex; flex-direction: column; gap: .9rem; }
.profile-section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--purple);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--pale);
  color: var(--plum);
  border: .5px solid var(--lilac);
  display: flex;
  align-items: center;
  gap: 4px;
}
.chip-drain { background: #FFF5F5; border-color: #FFCDD2; color: #8B2020; }
.chip-energy { background: #FFF8E1; border-color: var(--amber); color: #5D3A00; }
.chip-peak  { background: var(--pale); border-color: var(--purple); color: var(--plum); }

.profile-caveat {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.55;
  background: var(--pale);
  border-radius: 7px;
  padding: 9px 11px;
  border: .5px solid var(--lilac);
}
.private-note {
  margin: .75rem 1.25rem 0;
  background: var(--priv-bg);
  border: .5px solid var(--priv-bd);
  border-radius: 10px;
  padding: .85rem 1rem;
}
.private-note-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--priv);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.btn-action {
  margin: .85rem 1.25rem 0;
  width: calc(100% - 2.5rem);
  background: var(--plum);
  color: var(--yellow);
  font-size: 13px;
  font-weight: 500;
  border: none;
  border-radius: 9px;
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: opacity .15s;
}
.btn-action:hover { opacity: .9; }
.btn-restart {
  margin: .6rem 1.25rem 0;
  width: calc(100% - 2.5rem);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  border: .5px solid var(--lilac);
  border-radius: 9px;
  padding: 10px;
}
.spacer { height: 2.5rem; }

/* ── Accessibility ──────────────────────────────────────── */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border-width: 0;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; }
}
@media (max-width: 500px) {
  .tile-grid { grid-template-columns: repeat(2, 1fr); }
  .tod-grid  { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="shell" id="shell">
  <header class="hdr" role="banner">
    <div class="logo">Brain in Hand <span>· Work With Me</span></div>
    <div class="step-counter" id="step-counter" aria-live="polite">Step 1 of 9</div>
  </header>
  <div class="pips" id="pips" role="progressbar" aria-label="Profile progress"></div>
  <main id="app" role="main"></main>
</div>

<script>
/* ── Data ───────────────────────────────────────────────── */
const AVATARS = ['🧠','🌟','🦋','🌿','🎯','🦄','🐙','🦊','🌈','🐺','🌙','⚡','🍀','🎨','🦁','🐸','🌻','🎵','🦅','🌊'];

const VS = { NONE: 0, PUBLIC: 1, PRIVATE: 2, SKIP: 3 };
const VS_LABEL  = ['', 'On my profile', 'I know — not shared', 'I\'d rather not say'];
const VS_SHORT  = ['', 'Profile', 'Private', 'Skip'];
const VS_HINT   = ['', 'Visible on your profile', 'Noted for yourself only', 'Not included'];

const CHARGE_TILES = [
  { e: '🎵', l: 'Music or background sound while I work' },
  { e: '🌿', l: 'Time outside between tasks' },
  { e: '🤝', l: 'A good one-to-one conversation' },
  { e: '📝', l: 'Time to write and organise my thoughts' },
  { e: '🎯', l: 'Clear goals and visible progress' },
  { e: '🧩', l: 'A complex problem to get into' },
  { e: '🔇', l: 'A quiet period with no meetings' },
  { e: '☕', l: 'A gentle start before diving in' },
  { e: '🏃', l: 'Moving my body during the day' },
  { e: '🌟', l: 'Positive acknowledgement when it\'s due' },
  { e: '🔋', l: 'Knowing what\'s coming — no surprises' },
  { e: '🛋️', l: 'Working from my own space' },
];

const DRAIN_TILES = [

/* ── Utilities ──────────────────────────────────────────── */
function batColor(p) {
  return p > 60 ? 'var(--purple)' : p > 30 ? 'var(--amber)' : 'var(--drain)';
}
function batTip(p) {
  if (p >= 80) return 'Running well — protecting this is worth thinking about.';
  if (p >= 60) return 'Decent baseline. Small changes can make a real difference.';
  if (p >= 40) return 'Some depletion. Worth noticing what\'s costing most right now.';
  if (p >= 20) return 'Running low. Your organisation\'s support processes may help.';
  return 'Very depleted — your organisation\'s support processes are worth exploring.';
}
function countPublic() {
  let n = 0;
  ['contact','social','meetings','feedback','know'].forEach(id => {
    Object.values(tileAnswers[id] || {}).forEach(v => { if (v === VS.PUBLIC) n++; });
  });
  n += chargeSelections.length + drainSelections.length;
  if (todPeaks.length || todLows.length) n++;
  return n;
}
function getPublicTiles(id) {
  const step = STEPS.find(s => s.id === id);
  return Object.entries(tileAnswers[id] || {})
    .filter(([, v]) => v === VS.PUBLIC)
    .map(([k]) => step.tiles[parseInt(k)]);
}
function getPrivateTiles(id) {
  const step = STEPS.find(s => s.id === id);
  return Object.entries(tileAnswers[id] || {})
    .filter(([, v]) => v === VS.PRIVATE)
    .map(([k]) => step.tiles[parseInt(k)]);
}

/* ── Rendering helpers ──────────────────────────────────── */
function renderPips() {
  const pipsEl = document.getElementById('pips');
  pipsEl.innerHTML = '';
  STEPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pip' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    pipsEl.appendChild(d);
  });
  document.getElementById('step-counter').textContent =
    currentStep < STEPS.length
      ? `Step ${currentStep + 1} of ${STEPS.length}`
      : 'Review';
}

function chipHtml(tiles, cls = '') {
  return tiles.map(t => `<div class="chip ${cls}">${t.e} ${t.l}</div>`).join('');
}

function tileGridHtml(stepId, tiles, isDrain) {
  const map = tileAnswers[stepId] || {};
  return tiles.map((t, i) => {
    const v = map[i] || VS.NONE;
    const vsClass = v === VS.PUBLIC ? ' vs-public' : v === VS.PRIVATE ? ' vs-private' : v === VS.SKIP ? ' vs-skip' : '';
    const drainClass = isDrain ? ' drain-tile' : '';
    return `<div class="tile${drainClass}${vsClass}" onclick="cycleTile('${stepId}',${i})" role="button" tabindex="0" aria-label="${t.l}: ${VS_LABEL[v] || 'not set'}">
      <div class="tile-top">
        <span class="tile-emoji" aria-hidden="true">${t.e}</span>
        ${v > VS.NONE ? `<span class="tile-badge" aria-hidden="true">${VS_SHORT[v]}</span>` : ''}
      </div>
      <div class="tile-label">${t.l}</div>
      ${v > VS.NONE ? `<div class="tile-hint" aria-hidden="true">${VS_HINT[v]}</div>` : ''}
    </div>`;
  }).join('');
}

  </div>`;

  if (charges.length) body += `<div><div class="profile-section-title">What charges me</div><div class="chips">${chipHtml(charges)}</div></div>`;
  if (drains.length)  body += `<div><div class="profile-section-title">What drains me</div><div class="chips">${chipHtml(drains, 'chip-drain')}</div></div>`;

  if (peaks.length || lows.length) {
    body += `<div><div class="profile-section-title">Energy through the day</div><div class="chips">`;
    peaks.forEach(t => { body += `<div class="chip chip-peak">⚡ ${t.label} — peak</div>`; });
    lows.forEach(t  => { body += `<div class="chip chip-drain">🔋 ${t.label} — low</div>`; });
    body += `</div></div>`;
  }

  sections.forEach(sec => {
    const pub = getPublicTiles(sec.id);
    if (pub.length) {
      body += `<div><div class="profile-section-title">${sec.title}</div><div class="chips">${chipHtml(pub)}</div></div>`;
    }
  });

  body += `<div class="profile-caveat">This is a working preferences profile only. It is not a medical disclosure, a legal document, or a record of any workplace process. It does not replace Access to Work, Occupational Health, or any other support process your organisation has in place.</div>
      </div>
    </div>`;

  if (allPrivate.length) {
    body += `<div class="private-note">
      <div class="private-note-title">🔒 Your private notes — only visible to you</div>
      <div class="chips">${allPrivate.map(t => `<div class="chip" style="background:var(--priv-bg);border-color:var(--priv-bd);color:var(--priv)">${t.e} ${t.l}</div>`).join('')}</div>
    </div>`;
  }

  body += `<button class="btn-action" onclick="window.print()">⬇ Save or print my profile</button>
    <button class="btn-restart" onclick="restart()">Start again</button>
    <div class="spacer"></div>`;

  return body;
}

/* ── Main render ────────────────────────────────────────── */
function render() {
  renderPips();
  const app = document.getElementById('app');

  if (currentStep >= STEPS.length) {
    // Consent gate
    app.innerHTML = renderConsentGate();
    return;
  }

  const step = STEPS[currentStep];
  switch (step.type) {
    case 'intro':   app.innerHTML = renderIntro();   break;
    case 'avatar':  app.innerHTML = renderAvatar();  break;
    case 'tiles':   app.innerHTML = renderTiles(step); break;
    case 'battery': app.innerHTML = renderBattery(); break;
    case 'tod':     app.innerHTML = renderTOD();     break;
  }

  // Re-attach avatar picker listener after render
  if (step.type === 'avatar') {
    document.addEventListener('click', closePickerOnOutside, { once: true });
  }

  // Scroll to top on step change
  window.scrollTo(0, 0);
}

/* ── Event handlers ─────────────────────────────────────── */
function goNext() {
  currentStep++;
  render();
}
function goBack() {
  if (currentStep > 0) { currentStep--; render(); }
}

function cycleTile(id, i) {
  const m = tileAnswers[id];
  const cur = m[i] || VS.NONE;
  m[i] = cur >= VS.SKIP ? VS.NONE : cur + 1;
  render();
}

function toggleCharge(i) {
  const idx = chargeSelections.indexOf(i);
  idx === -1 ? chargeSelections.push(i) : chargeSelections.splice(idx, 1);
  reRenderBattery();
}
function toggleDrain(i) {
  const idx = drainSelections.indexOf(i);
  idx === -1 ? drainSelections.push(i) : drainSelections.splice(idx, 1);
  reRenderBattery();
}
function setDrainMode(v) { drainMode = v; reRenderBattery(); }
function reRenderBattery() {
  document.getElementById('app').innerHTML = renderBattery();
}

function toggleTOD(id) {
  const pi = todPeaks.indexOf(id);
  const li = todLows.indexOf(id);
  if (pi === -1 && li === -1) { todPeaks.push(id); }
  else if (pi !== -1) { todPeaks.splice(pi, 1); todLows.push(id); }
  else { todLows.splice(li, 1); }
  document.getElementById('app').innerHTML = renderTOD();
}

function togglePicker(e) {
  e.stopPropagation();
  avatarPickerOpen = !avatarPickerOpen;
  const picker = document.getElementById('av-picker');
  if (picker) picker.style.display = avatarPickerOpen ? 'grid' : 'none';
  if (avatarPickerOpen) {
    document.addEventListener('click', closePickerOnOutside, { once: true });
  }
}
function closePickerOnOutside() {
  avatarPickerOpen = false;
  const picker = document.getElementById('av-picker');
  if (picker) picker.style.display = 'none';
}
function pickAvatar(e) {
  avatarEmoji = e;
  avatarPickerOpen = false;
  render();
}

function toggleJD() { jdLoaded = !jdLoaded; render(); }

function updateNextBtn() {
  const btn = document.querySelector('.btn-next');
  if (btn) btn.disabled = !userName.trim();
}

function toggleConsent() {
  consentChecked = !consentChecked;
  const cb = document.getElementById('consent-cb');
  if (cb) cb.checked = consentChecked;
  const pb = document.getElementById('pub-btn');
  if (pb) pb.disabled = !consentChecked;
}

function publishProfile() {
  if (!consentChecked) return;
  renderPips();
  document.getElementById('step-counter').textContent = 'Your profile';
  document.getElementById('app').innerHTML = renderProfile();
  window.scrollTo(0, 0);
}

function restart() {
  currentStep = 0;
  avatarEmoji = '🧠'; avatarPickerOpen = false;
  userName = ''; userRole = ''; jdLoaded = false;
  chargeLevel = 65; drainMode = false; consentChecked = false;
  tileAnswers = {};
  STEPS.forEach(s => { if (s.type === 'tiles') tileAnswers[s.id] = {}; });
  chargeSelections = []; drainSelections = [];
  todPeaks = []; todLows = [];
  render();
}

/* ── Keyboard accessibility on tiles ────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const t = e.target;
    if (t.classList.contains('tile') || t.classList.contains('tod-cell') ||
        t.classList.contains('stog') || t.classList.contains('jd-box')) {
      e.preventDefault();
      t.click();
    }
  }
});

/* ── Boot ───────────────────────────────────────────────── */
render();
</script>
</body>
</html>
